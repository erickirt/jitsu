# Jitsu Development Environment
# =============================
#
# == Password Configuration ==
# Override defaults via environment variables:
#   POSTGRES_PASSWORD (default: postgres-mqf3nzx)
#   CLICKHOUSE_PASSWORD (default: clickhouse-pass)
#   MONGODB_PASSWORD (default: mongodb-pass)
#   SEED_USER_PASSWORD (default: admin123)
#
# == Core Services ==
# PostgreSQL:         postgresql://postgres:postgres-mqf3nzx@localhost:5438/postgres
# MongoDB:            mongodb://admin:mongodb-pass@localhost:27017/admin
# ClickHouse HTTP:    http://default:clickhouse-pass@localhost:8123/default
# ClickHouse Native:  clickhouse://default:clickhouse-pass@localhost:9000/default
# Redpanda (Kafka):   kafka://localhost:19092 (no auth)
#
# == Debug/Admin Tools ==
# Redpanda Console:     http://localhost:11801 (no auth)
# PgWeb (PostgreSQL):   http://localhost:11802 (no auth, auto-connected)
# ClickHouse Play UI:   http://localhost:8123/play?user=default#c2VsZWN0IE5PVygpOw== (default / clickhouse-pass)
# Mongo Express:        http://localhost:11803 (admin/mongodb-pass)
# Keycloak:             http://localhost:11804 (admin/admin)
#
# == Jitsu Services ==
# Console:              http://localhost:3000 (admin@jitsu.com / admin123)
# Rotor:                http://localhost:3401
#
# Usage:
#   Default (all):           docker compose -f ./devenv/docker-compose.yml up -d
#   Dependencies only:       docker compose -f ./devenv/docker-compose.yml --profile jitsu-dependencies up -d
#
# Data directories: ./data/{postgres,redpanda,mongodb,clickhouse,cloudbeaver}
#

name: jitsu

# Global variables - override via environment variables
# POSTGRES_PASSWORD (default: postgres-mqf3nzx)
# CLICKHOUSE_PASSWORD (default: clickhouse-pass)
# MONGODB_PASSWORD (default: mongodb-pass)
# SEED_USER_PASSWORD (default: admin123)

networks:
  jitsu-dev-network:
    name: jitsu-dev-network
    driver: bridge

services:
  # == Core Services ==

  dep-postgres:
    container_name: jitsu-dep-postgres
    networks:
      - jitsu-dev-network
    tty: true
    image: postgres:14
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres-mqf3nzx}
    logging:
      options:
        max-size: 10m
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "postgres", "-U", "postgres"]
      interval: 1s
      timeout: 10s
      retries: 10
    ports:
      - "${PG_PORT:-5438}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    profiles:
      - jitsu-services
      - jitsu-dependencies

  dep-mongodb:
    container_name: jitsu-dep-mongodb
    networks:
      - jitsu-dev-network
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-mongodb-pass}
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - ./data/mongodb:/data/db
    profiles:
      - jitsu-services
      - jitsu-dependencies

  dep-clickhouse:
    container_name: jitsu-dep-clickhouse
    networks:
      - jitsu-dev-network
    image: clickhouse/clickhouse-server:latest
    restart: always
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse-pass}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    profiles:
      - jitsu-services
      - jitsu-dependencies

  dep-redpanda:
    container_name: jitsu-dep-redpanda
    networks:
      - jitsu-dev-network
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://dep-redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://dep-redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr dep-redpanda:33145
      - --advertise-rpc-addr dep-redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory 1G
    ports:
      - "18081:18081"
      - "18082:18082"
      - "19092:19092"
      - "19644:9644"
    volumes:
      - ./data/redpanda:/var/lib/redpanda/data
    profiles:
      - jitsu-services
      - jitsu-dependencies

  # == Debug/Admin Tools ==

  dep-redpanda-console:
    container_name: jitsu-dep-redpanda-console
    networks:
      - jitsu-dev-network
    image: docker.redpanda.com/redpandadata/console:latest
    ports:
      - "${REDPANDA_CONSOLE_PORT:-11801}:8080"
    environment:
      KAFKA_BROKERS: "dep-redpanda:9092"
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: "http://dep-redpanda:8081"
    depends_on:
      - dep-redpanda
    profiles:
      - jitsu-services
      - jitsu-dependencies

  dep-pgweb:
    container_name: jitsu-dep-pgweb
    networks:
      - jitsu-dev-network
    image: sosedoff/pgweb:latest
    restart: always
    environment:
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD:-postgres-mqf3nzx}@dep-postgres:5432/postgres?sslmode=disable"
    ports:
      - "${PGWEB_PORT:-11802}:8081"
    depends_on:
      - dep-postgres
    profiles:
      - jitsu-services
      - jitsu-dependencies

  dep-mongo-express:
    container_name: jitsu-dep-mongo-express
    networks:
      - jitsu-dev-network
    image: mongo-express:latest
    restart: always
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGODB_PASSWORD:-mongodb-pass}
      ME_CONFIG_MONGODB_URL: mongodb://admin:${MONGODB_PASSWORD:-mongodb-pass}@dep-mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGODB_PASSWORD:-mongodb-pass}
    ports:
      - "${MONGO_EXPRESS_PORT:-11803}:8081"
    depends_on:
      - dep-mongodb
    profiles:
      - jitsu-services
      - jitsu-dependencies

  dep-keycloak:
    container_name: jitsu-dep-keycloak
    networks:
      - jitsu-dev-network
    command: start-dev
    image: "quay.io/keycloak/keycloak:26.0.4"
    environment:
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
    ports:
      - "${KEYCLOAK_PORT:-11804}:8080"
    profiles:
      - jitsu-services
      - jitsu-dependencies

  console:
    container_name: jitsu-console
    networks:
      - jitsu-dev-network
    build:
      context: ..
      dockerfile: all.Dockerfile
      target: console
    restart: unless-stopped
    ports:
      - "${CONSOLE_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - NEXT_PUBLIC_LOG_LEVEL=debug
      - LOG_FORMAT=text
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres-mqf3nzx}@dep-postgres:5432/postgres?schema=newjitsu
      - APP_DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres-mqf3nzx}@dep-postgres:5432/postgres?schema=newjitsu
      - CLICKHOUSE_URL=http://dep-clickhouse:8123/
      - CLICKHOUSE_HOST=dep-clickhouse:8123
      - CLICKHOUSE_USERNAME=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse-pass}
      - CLICKHOUSE_DATABASE=default
      - CLICKHOUSE_SSL=false
      - MONGODB_URL=mongodb://admin:${MONGODB_PASSWORD:-mongodb-pass}@dep-mongodb:27017/admin
      - MONGODB_TIMEOUT_MS=1000
      - KAFKA_BOOTSTRAP_SERVERS=dep-redpanda:9092
      - KAFKA_SSL=false
      - KAFKA_DESTINATIONS_TOPIC_NAME=destination-messages
      - KAFKA_DESTINATIONS_DEAD_LETTER_TOPIC_NAME=destination-messages-dead-letter
      - KAFKA_DESTINATIONS_RETRY_TOPIC_NAME=destination-messages-retry
      - KAFKA_DESTINATIONS_MT_TOPIC_NAME=destination-messages-mt
      - JWT_SECRET=6de1460fd8ba429285c9e72cc5339291
      - EE_API_AUTH_TOKENS=5f92ff738db8432899737fbdc7259bbd
      - EE_CONNECTION=http://console:3000?jwtSecret=6de1460fd8ba429285c9e72cc5339291
      - CONSOLE_RAW_AUTH_TOKENS=1
      - EE_DISABLE_AUTH=yes
      - DISABLE_SIGNUP=false
      - ENABLE_CREDENTIALS_LOGIN=true
      - SEED_USER_EMAIL=admin@jitsu.com
      - SEED_USER_PASSWORD=${SEED_USER_PASSWORD:-admin123}
    depends_on:
      dep-postgres:
        condition: service_healthy
      dep-clickhouse:
        condition: service_started
      dep-mongodb:
        condition: service_started
      dep-redpanda:
        condition: service_started
    profiles:
      - jitsu-services

  rotor:
    container_name: jitsu-rotor
    networks:
      - jitsu-dev-network
    build:
      context: ..
      dockerfile: all.Dockerfile
      target: rotor
    restart: unless-stopped
    ports:
      - "${ROTOR_PORT:-3401}:3401"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3401/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - LOG_FORMAT=text
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres-mqf3nzx}@dep-postgres:5432/postgres?schema=newjitsu
      - CLICKHOUSE_URL=http://dep-clickhouse:8123/
      - CLICKHOUSE_HOST=dep-clickhouse:8123
      - CLICKHOUSE_USERNAME=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse-pass}
      - CLICKHOUSE_DATABASE=default
      - CLICKHOUSE_SSL=false
      - MONGODB_URL=mongodb://admin:${MONGODB_PASSWORD:-mongodb-pass}@dep-mongodb:27017/admin
      - BULKER_URL=http://jitsu.local:3050
      - BULKER_AUTH_KEY=dev-auth-key
      - REPOSITORY_BASE_URL=http://console:3000/api/admin/export
      - REPOSITORY_AUTH_TOKEN=service-admin-account:1
      - MONGODB_TIMEOUT_MS=1000
      - KAFKA_BOOTSTRAP_SERVERS=dep-redpanda:9092
      - KAFKA_SSL=false
      - KAFKA_COMPRESSION_TYPE=snappy
      - KAFKA_COMPRESSION_CODEC=snappy
      - KAFKA_DESTINATIONS_TOPIC_NAME=destination-messages
      - KAFKA_DESTINATIONS_DEAD_LETTER_TOPIC_NAME=destination-messages-dead-letter
      - KAFKA_DESTINATIONS_RETRY_TOPIC_NAME=destination-messages-retry
      - KAFKA_DESTINATIONS_MT_TOPIC_NAME=destination-messages-mt
    depends_on:
      dep-postgres:
        condition: service_healthy
      dep-clickhouse:
        condition: service_started
      dep-mongodb:
        condition: service_started
      dep-redpanda:
        condition: service_started
      console:
        condition: service_healthy
    profiles:
      - jitsu-services
