name: Generate Version
description: Generate version number based on current branch and git tags

inputs:
  version_file:
    description: "Path to version file"
    required: false
    default: ".version.json"

outputs:
  version:
    description: "Generated version"
    value: ${{ steps.generate.outputs.version }}
  tag:
    description: "Git tag for this version"
    value: ${{ steps.generate.outputs.tag }}
  channel:
    description: "Detected release channel (stable, beta, or canary)"
    value: ${{ steps.generate.outputs.channel }}

runs:
  using: composite
  steps:
    - name: Generate version
      id: generate
      shell: bash
      run: ./versions.sh
