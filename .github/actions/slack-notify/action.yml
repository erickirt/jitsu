name: Send Slack Notification
description: Send a formatted notification to Slack with custom blocks

inputs:
  slack_webhook_url:
    description: "Slack webhook URL"
    required: true
  color:
    description: "Notification color (good, warning, danger, or hex color)"
    required: true
  header:
    description: "Header text for the notification"
    required: true
  blocks:
    description: "YAML array of block objects with title, value, url (optional), is_code (optional)"
    required: true

runs:
  using: composite
  steps:
    - name: 📦 Install yq
      shell: bash
      run: |
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq

    - name: 🔄 Convert YAML to JSON
      id: convert
      shell: bash
      env:
        BLOCKS_YAML: ${{ inputs.blocks }}
      run: |
        BLOCKS_JSON=$(echo "$BLOCKS_YAML" | yq -o=json '.')
        echo "blocks_json<<EOF" >> $GITHUB_OUTPUT
        echo "$BLOCKS_JSON" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: 💬 Send Slack notification
      uses: actions/github-script@v7
      env:
        SLACK_WEBHOOK_URL: ${{ inputs.slack_webhook_url }}
        COLOR: ${{ inputs.color }}
        HEADER: ${{ inputs.header }}
        BLOCKS_JSON: ${{ steps.convert.outputs.blocks_json }}
      with:
        script: |
          const blocks = JSON.parse(process.env.BLOCKS_JSON);

          // Build sections from blocks
          const sections = blocks.map(block => {
            if (block.is_code) {
              // Use separate header and context blocks for code to avoid collapse
              return [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: `*${block.title}:*`
                  }
                },
                {
                  type: "context",
                  elements: [
                    {
                      type: "mrkdwn",
                      text: `\`\`\`${block.value}\`\`\``
                    }
                  ]
                }
              ];
            } else {
              let text = `*${block.title}:* `;

              if (block.url) {
                text += `<${block.url}|${block.value}>`;
              } else {
                text += block.value;
              }

              return {
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: text
                }
              };
            }
          }).flat();

          // Build complete payload
          const payload = {
            attachments: [
              {
                color: process.env.COLOR,
                blocks: [
                  {
                    type: "header",
                    text: {
                      type: "plain_text",
                      text: process.env.HEADER
                    }
                  },
                  ...sections
                ]
              }
            ]
          };

          // Send to Slack
          const response = await fetch(process.env.SLACK_WEBHOOK_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const text = await response.text();
            throw new Error(`Slack webhook failed: ${response.statusText} - ${text}`);
          }

          console.log('✅ Slack notification sent successfully');
