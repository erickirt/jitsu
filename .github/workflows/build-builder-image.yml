# Build Builder Image
#
# This workflow builds and publishes the jitsu-builder Docker image to GitHub Container Registry (GHCR).
#
# WHY WE NEED THIS:
# The jitsu-builder image contains all dependencies needed for CI builds and tests:
# - Node.js 22 (our runtime)
# - pnpm 10 (our package manager)
# - Playwright with pre-installed browser binaries (for E2E tests)
#
# By pre-installing these dependencies, we significantly speed up CI workflows.
# Without this image, each CI run would need to install Playwright browsers (~500MB), adding 2-3 minutes per run.
#
# HOW IT'S USED:
# - The lint.yml workflow uses this image as a container for running builds, tests, and linting
# - Workflow triggers: automatically on changes to builder.Dockerfile on newjitsu branch, or manually via workflow_dispatch
# - Publishes to: ghcr.io/<owner>/jitsu-builder:latest
# - Uses GitHub Actions cache backend (type=gha) for fast layer caching (up to 10GB per repo)
#
name: Build Builder Image

on:
  push:
    branches:
      - newjitsu
    paths:
      - builder.Dockerfile
      - .github/workflows/build-builder-image.yml
      - pnpm-lock.yaml
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ Build and Push Builder Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: builder.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jitsu-builder:latest
          # Use GitHub Actions cache (recommended for GHA workflows)
          # Supports up to 10GB per repository with automatic eviction
          cache-from: type=gha
          cache-to: type=gha,mode=max
