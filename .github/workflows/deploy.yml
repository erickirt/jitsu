name: 🚀 Deploy

# Manual deploy: bumps image tags in jitsucom/jitsu-cloud-infra
#
# ----------------------------------------------------------------------------
# One-time setup before this workflow can run:
#
# 1. GitHub App for cross-repo write to jitsucom/jitsu-cloud-infra:
#    - Create at: org settings → Developer settings → GitHub Apps → New
#    - Repository permissions: Contents: Read and write (nothing else)
#    - Install on jitsucom/jitsu-cloud-infra only
#    - Note the App ID and download the private key (PEM)
#    - Add as secrets here:
#      * JITSU_CLOUD_INFRA_APP_ID         — the numeric App ID
#      * JITSU_CLOUD_INFRA_APP_PRIVATE_KEY — the full PEM private key contents
#
# 2. CI_SLACK_WEBHOOK already exists (used by lint.yml).
#

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        # Keep this list in sync with the keys in
        # jitsu-cloud-infra/k8s/deploy-targets.yaml.
        type: choice
        options:
          - rotor
          - rotor-shard1
          - rotor-shard2
          - profiles
          - bulker
          - ingest
          - operator
          - functions-server
          - admin
          - reprocessing-worker
          - syncctl
          - sidecar
          - cfgkpr
          - ingmgr
          - console
        default: rotor
      channel:
        description: "Release channel — picks the latest git tag matching this channel"
        type: choice
        options: [beta, stable, canary]
        default: beta
      tag:
        description: "Optional explicit image tag (overrides channel-based resolution)"
        type: string
        required: false
      dry_run:
        description: "Print the diff and skip commit + sync"
        type: boolean
        default: false

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout newjitsu (for tag listing + slack-notify action)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🔑 Mint GitHub App token for jitsu-cloud-infra
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.JITSU_CLOUD_INFRA_APP_ID }}
          private-key: ${{ secrets.JITSU_CLOUD_INFRA_APP_PRIVATE_KEY }}
          owner: jitsucom
          repositories: jitsu-cloud-infra

      - name: 📥 Checkout jitsu-cloud-infra
        uses: actions/checkout@v6
        with:
          repository: jitsucom/jitsu-cloud-infra
          token: ${{ steps.app-token.outputs.token }}
          path: cloud-infra
          ref: main

      - name: 🛠 Install kustomize CLI
        # kubectl on ubuntu-latest has kustomize built in, but we need the
        # standalone CLI for `kustomize edit set image`. Pinned to a specific
        # release + SHA256 so the deploy workflow can't be silently swapped
        # for a malicious binary by a compromised installer script.
        env:
          KUSTOMIZE_VERSION: "5.8.1"
          # From https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.8.1/checksums.txt
          KUSTOMIZE_SHA256: "029a7f0f4e1932c52a0476cf02a0fd855c0bb85694b82c338fc648dcb53a819d"
        run: |
          set -eu
          URL="https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o /tmp/kustomize.tgz "$URL"
          echo "${KUSTOMIZE_SHA256}  /tmp/kustomize.tgz" | sha256sum -c -
          tar -xzf /tmp/kustomize.tgz -C /tmp kustomize
          sudo install -m 0755 /tmp/kustomize /usr/local/bin/kustomize
          rm -f /tmp/kustomize.tgz /tmp/kustomize
          kustomize version

      - name: 🔎 Resolve tag
        id: resolve
        env:
          INPUT_SERVICE: ${{ inputs.service }}
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -eu

          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
            echo "Tag from explicit input: $TAG"
          else
            # Pick the latest git tag matching the requested channel.
            # services.yaml only pushes git tags for stable + beta; canary
            # builds only get Docker tags, so there's nothing to resolve here.
            case "$INPUT_CHANNEL" in
              stable)
                LATEST=$(git tag -l 'jitsu-services*' | grep -vE '\-(beta|canary)\.' | sort -V | tail -1)
                ;;
              beta)
                LATEST=$(git tag -l 'jitsu-services*-beta.*' | sort -V | tail -1)
                ;;
              canary)
                echo "::error::Canary builds don't push git tags — provide an explicit 'tag' input (e.g. 2.14.0-canary.20260101.abcd123)."
                exit 1
                ;;
            esac

            if [ -z "$LATEST" ]; then
              echo "::error::No '$INPUT_CHANNEL' git tag found in this repo. Provide an explicit 'tag' input or pick a different channel."
              exit 1
            fi

            # Strip the prefix (handles both `jitsu-services2.14.0` and `jitsu-services-v2.14.0`).
            TAG=$(echo "$LATEST" | sed 's/^jitsu-services-\?v\?//')
            echo "Latest $INPUT_CHANNEL git tag: $LATEST → $TAG"
          fi

          # The dropdown enforces validity — but sanity-check the service is
          # actually known to deploy-targets.yaml in case the two drift.
          REGISTRY="cloud-infra/k8s/deploy-targets.yaml"
          if ! yq -er ".targets.\"$INPUT_SERVICE\"" "$REGISTRY" > /dev/null 2>&1; then
            echo "::error::Service '$INPUT_SERVICE' is not present in $REGISTRY. Sync the dropdown options with the registry."
            exit 1
          fi

          echo "tag=$TAG"               >> "$GITHUB_OUTPUT"
          echo "service=$INPUT_SERVICE" >> "$GITHUB_OUTPUT"
          echo "channel=$INPUT_CHANNEL" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Plan: bump $INPUT_SERVICE to $TAG ($INPUT_CHANNEL)"

      - name: 📝 Bump image tag
        id: bump
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
          SERVICE: ${{ steps.resolve.outputs.service }}
        run: |
          set -eu
          REGISTRY="cloud-infra/k8s/deploy-targets.yaml"

          FOLDER=$(yq -r ".targets.\"$SERVICE\".folder" "$REGISTRY")
          ARGOCD_APP=$(yq -r ".targets.\"$SERVICE\".argocd_app" "$REGISTRY")
          IMAGE=$(yq -r ".targets.\"$SERVICE\".image // \"\"" "$REGISTRY")
          PATCH=$(yq -r ".targets.\"$SERVICE\".patch // \"\"" "$REGISTRY")
          HELM_VALUE=$(yq -r ".targets.\"$SERVICE\".helm_value // \"\"" "$REGISTRY")

          echo "→ $SERVICE → $TAG  (folder: $FOLDER, argocd app: $ARGOCD_APP)"

          if [ -n "$IMAGE" ]; then
            ( cd "cloud-infra/$FOLDER" && kustomize edit set image "$IMAGE=$IMAGE:$TAG" )
          elif [ -n "$PATCH" ]; then
            ENV_VAR=$(yq -r ".targets.\"$SERVICE\".env_var" "$REGISTRY")
            IMAGE_PREFIX=$(yq -r ".targets.\"$SERVICE\".image_prefix" "$REGISTRY")
            yq -i "(.spec.template.spec.containers[].env[] | select(.name == \"$ENV_VAR\").value) = \"$IMAGE_PREFIX:$TAG\"" "cloud-infra/$FOLDER/$PATCH"
          elif [ -n "$HELM_VALUE" ]; then
            HELM_FILE=$(yq -r ".targets.\"$SERVICE\".helm_values_file" "$REGISTRY")
            yq -i ".$HELM_VALUE = \"$TAG\"" "cloud-infra/$FOLDER/$HELM_FILE"
          else
            echo "::error::Target $SERVICE in deploy-targets.yaml has no image / patch / helm_value field"
            exit 1
          fi

          echo "argocd_app=$ARGOCD_APP" >> "$GITHUB_OUTPUT"
          echo "folder=$FOLDER"         >> "$GITHUB_OUTPUT"
          echo ""
          echo "ArgoCD app to sync: $ARGOCD_APP"

      - name: 🔍 Verify rendered output
        env:
          SERVICE: ${{ steps.resolve.outputs.service }}
          FOLDER: ${{ steps.bump.outputs.folder }}
        run: |
          set -eu
          REGISTRY="cloud-infra/k8s/deploy-targets.yaml"
          HELM_VALUE=$(yq -r ".targets.\"$SERVICE\".helm_value // \"\"" "$REGISTRY")
          # Skip helm-mode folders (jitsu-platform); kustomize doesn't render them.
          if [ -z "$HELM_VALUE" ]; then
            echo "→ kubectl kustomize cloud-infra/$FOLDER"
            kubectl kustomize "cloud-infra/$FOLDER" > /dev/null
          fi

      - name: 📊 Show diff
        run: |
          cd cloud-infra
          if git diff --quiet; then
            echo "No changes — service already on the requested tag."
          else
            git --no-pager diff
          fi

      - name: 🔎 Resolve GitHub App bot user ID
        if: ${{ !inputs.dry_run }}
        id: bot-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          echo "user-id=$USER_ID" >> "$GITHUB_OUTPUT"

      - name: 💾 Commit and push to jitsu-cloud-infra
        if: ${{ !inputs.dry_run }}
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
          SERVICE: ${{ steps.resolve.outputs.service }}
          BOT_NAME: ${{ steps.app-token.outputs.app-slug }}[bot]
          BOT_EMAIL: ${{ steps.bot-user.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com
        run: |
          set -eu
          cd cloud-infra
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name  "$BOT_NAME"
          git config user.email "$BOT_EMAIL"
          git add -A
          git commit \
            -m "deploy: bump $SERVICE to $TAG" \
            -m "Triggered by ${{ github.actor }} via ${{ github.workflow }} run ${{ github.run_id }}."
          git push origin main

      - name: 💬 Slack notification
        if: always() && !inputs.dry_run
        uses: ./.github/actions/slack-notify
        with:
          slack_webhook_url: ${{ secrets.CI_SLACK_WEBHOOK }}
          color: ${{ job.status == 'success' && '#36a64f' || '#ff0000' }}
          header: "${{ job.status == 'success' && '✅' || '❌' }} 🚀 Deploy `${{ steps.resolve.outputs.service }}` → `${{ steps.resolve.outputs.tag }}` (${{ steps.resolve.outputs.channel }}) ${{ job.status == 'success' && 'SUCCEEDED' || 'FAILED' }}"
          blocks: |
            - title: Service
              value: ${{ steps.resolve.outputs.service }}
            - title: Tag
              value: ${{ steps.resolve.outputs.tag }}
            - title: Channel
              value: ${{ steps.resolve.outputs.channel }}
            - title: ArgoCD app to sync
              value: ${{ steps.bump.outputs.argocd_app }}
            - title: Triggered by
              value: ${{ github.actor }}
            - title: Workflow run
              value: View workflow run
              url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
