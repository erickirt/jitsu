
name: Claude Code Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
  push:
    branches: [newjitsu]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review (leave blank to review a commit)
        required: false
      commit_sha:
        description: Commit SHA to review (leave blank when using PR number)
        required: false

env:
  REVIEW_INSTRUCTIONS: |
    Review for bugs, security issues, and correctness problems. Keep feedback actionable.
    Skip style/formatting nitpicks. If the change looks good, say so briefly.

jobs:
  claude-review:
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 2

      - name: Resolve PR number
        id: resolve-pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "is_temp=false" >> $GITHUB_OUTPUT
            echo "Resolved: PR #$PR_NUMBER from pull_request event"

          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.pr_number }}" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "is_temp=false" >> $GITHUB_OUTPUT
            echo "Resolved: PR #$PR_NUMBER from workflow_dispatch input"

          else
            SHA="${{ github.sha }}"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.commit_sha }}" ]; then
              SHA="${{ inputs.commit_sha }}"
            fi
            echo "Resolving PR for commit $SHA"

            EXISTING_PR=$(gh api "repos/$REPO/commits/$SHA/pulls" \
              -H "Accept: application/vnd.github.groot-preview+json" \
              --jq '.[0].number // empty' 2>/dev/null || true)

            if [ -n "$EXISTING_PR" ]; then
              echo "pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
              echo "is_temp=false" >> $GITHUB_OUTPUT
              echo "Resolved: found existing PR #$EXISTING_PR for commit $SHA"
            else
              echo "No existing PR found — creating temporary PR"
              SHORT="${SHA:0:12}"
              BRANCH_HEAD="temp/review-head-$SHORT"
              BRANCH_BASE="temp/review-base-$SHORT"
              PARENT=$(git rev-parse "$SHA^")

              git push origin "$SHA:refs/heads/$BRANCH_HEAD"
              git push origin "$PARENT:refs/heads/$BRANCH_BASE"

              PR_URL=$(gh pr create \
                --repo "$REPO" \
                --head "$BRANCH_HEAD" \
                --base "$BRANCH_BASE" \
                --title "Auto-review: $SHORT" \
                --body "Temporary PR for commit review. Will be closed automatically.")

              PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
              echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
              echo "is_temp=true" >> $GITHUB_OUTPUT
              echo "branch_head=$BRANCH_HEAD" >> $GITHUB_OUTPUT
              echo "branch_base=$BRANCH_BASE" >> $GITHUB_OUTPUT

              # Post commit comment with PR link
              gh api "repos/$REPO/commits/$SHA/comments" \
                -f body="Code review in progress: $PR_URL"

              echo "Created temp PR #$PR_NUMBER — $PR_URL"
            fi
          fi

      - name: Reopen PR if closed
        id: reopen-pr
        if: steps.resolve-pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER="${{ steps.resolve-pr.outputs.pr_number }}"
          STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state -q .state)
          echo "PR #$PR_NUMBER state: $STATE"
          if [ "$STATE" = "CLOSED" ]; then
            gh pr reopen "$PR_NUMBER" --repo "$REPO"
            echo "was_closed=true" >> $GITHUB_OUTPUT
            echo "Reopened PR #$PR_NUMBER for review"
          else
            echo "was_closed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Print Claude Code version
        run: claude --version

      - name: Install code-review plugin
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Refresh marketplace catalog, then install plugin
          claude plugin marketplace update claude-plugins-official 2>/dev/null || \
            claude plugin marketplace add anthropics/claude-plugins-official
          claude plugin install code-review@claude-plugins-official

      - name: Run code review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.resolve-pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          # Check out the PR branch so the plugin auto-detects the correct PR
          gh pr checkout "$PR_NUMBER" --repo "$REPO"

          RESULT=$(claude -p "/code-review:review" \
            --output-format json \
            --allowedTools "Bash(gh:*)")

          echo "$RESULT" | jq -r '"Tokens: in=\(.usage.input_tokens) out=\(.usage.output_tokens) cache_read=\(.usage.cache_read_input_tokens // 0) cache_write=\(.usage.cache_creation_input_tokens // 0)"'
          echo "$RESULT" | jq -r '"Cost: $\(.cost_usd)"'

      - name: Cleanup
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER="${{ steps.resolve-pr.outputs.pr_number }}"
          IS_TEMP="${{ steps.resolve-pr.outputs.is_temp }}"
          WAS_CLOSED="${{ steps.reopen-pr.outputs.was_closed }}"
          BRANCH_HEAD="${{ steps.resolve-pr.outputs.branch_head }}"
          BRANCH_BASE="${{ steps.resolve-pr.outputs.branch_base }}"

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR to clean up"
            exit 0
          fi

          if [ "$IS_TEMP" = "true" ] || [ "$WAS_CLOSED" = "true" ]; then
            gh pr close "$PR_NUMBER" --repo "$REPO" 2>/dev/null || true
            echo "Closed PR #$PR_NUMBER"
          fi

          if [ "$IS_TEMP" = "true" ] && [ -n "$BRANCH_HEAD" ]; then
            git push origin --delete "$BRANCH_HEAD" "$BRANCH_BASE" 2>/dev/null || true
            echo "Deleted temp branches $BRANCH_HEAD and $BRANCH_BASE"
          fi
