name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  claude-review:
    name: 🤖 Claude Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
 
      - name: 🔑 Check for Anthropic API key
        id: check-secret
        run: |
          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_key=true" >> $GITHUB_OUTPUT
          else
            echo "has_key=false" >> $GITHUB_OUTPUT
            echo "⚠️ Skipping Claude review: ANTHROPIC_API_KEY not available (external PR or secret not configured)"
          fi

      - name: 🤖 Run Claude Code Review
        if: steps.check-secret.outputs.has_key == 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Please review pull request #${{ github.event.pull_request.number }} in repository ${{ github.repository }}.

            PR Details:
            - Head branch: ${{ github.event.pull_request.head.ref }}
            - Base branch: ${{ github.event.pull_request.base.ref }}
            - Author: ${{ github.event.pull_request.user.login }}

            Steps:
            1. Use mcp__github__pull_request_read with method="get_diff" to fetch the PR changes
            2. Review the code changes for quality, bugs, performance, and security issues
            3. Add inline comments on specific lines using mcp__github_inline_comment__create_inline_comment

            Focus on actionable feedback and be constructive in your comments.
          mcp_servers: |
            github:
              marketplace: true
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github__pull_request_read,mcp__github__get_file_contents,mcp__github__list_commits,Bash(git:*),Bash(pnpm:*),Bash(npm:*),Bash(node:*),Bash(bun:*)"