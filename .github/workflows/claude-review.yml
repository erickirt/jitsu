
name: Claude Code Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
    # Don't self-review while this workflow is under development on fix/claude-review* branches
    branches-ignore:
      - 'fix/claude-review*'
  push:
    branches: [newjitsu]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review (leave blank to review a commit)
        required: false
      commit_sha:
        description: Commit SHA to review (leave blank when using PR number)
        required: false

env:
  REVIEW_INSTRUCTIONS: |
    Review for bugs, security issues, and correctness problems. Keep feedback actionable.
    Skip style/formatting nitpicks. If the change looks good, say so briefly.

jobs:
  claude-review:
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    # Concurrency key uses the actual subject being reviewed (PR number or commit SHA),
    # not github.sha (which is the same for all dispatch runs on the same branch).
    # cancel-in-progress: false means a second dispatch for the same subject queues
    # rather than cancelling the running review.
    concurrency:
      group: claude-review-${{ github.event.pull_request.number || inputs.pr_number || inputs.commit_sha || github.sha }}
      cancel-in-progress: false

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 1

      - name: Resolve PR number
        id: resolve-pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # ── make_temp_pr ──────────────────────────────────────────────────────────
          # Creates a short-lived GitHub PR so the code-review plugin can operate on
          # a commit that was pushed directly (no PR) or re-review a closed/merged PR.
          #
          # Base branch strategy — two paths depending on whether SHA is in newjitsu:
          #
          # Path A (commit NOT in newjitsu, e.g. head of a merged PR):
          #   Use newjitsu directly as base. The commit diverged from newjitsu so there
          #   are meaningful commits between them. No branch creation needed — avoids
          #   all permission issues.
          #
          # Path B (commit IS in newjitsu, e.g. direct push to main):
          #   Must use the commit's parent as base to isolate exactly what this commit
          #   changed. We push it as a temp branch, but first check whether it touches
          #   .github/workflows/: GitHub blocks pushing commits that modify workflow
          #   files without `workflows: write`, which GITHUB_TOKEN cannot be granted
          #   via the `permissions:` block. A PAT with `workflow` scope (stored as
          #   WORKFLOW_TOKEN secret) would solve this, but for now we skip gracefully.
          make_temp_pr() {
            local SHA="$1"
            local SHORT="${SHA:0:12}"
            local BRANCH_HEAD="temp/review-head-$SHORT"
            local BRANCH_BASE="temp/review-base-$SHORT"

            echo "Creating temp PR for $SHORT"

            # Fetch commit metadata in one API call: parent SHA, first line of message, author
            local COMMIT_INFO
            COMMIT_INFO=$(gh api "repos/$REPO/commits/$SHA" \
              --jq '{parent: .parents[0].sha, msg: (.commit.message | split("\n")[0]), author: (.author.login // .commit.author.name)}')
            local PARENT MSG AUTHOR
            PARENT=$(echo "$COMMIT_INFO" | jq -r '.parent')
            MSG=$(echo "$COMMIT_INFO" | jq -r '.msg')
            AUTHOR=$(echo "$COMMIT_INFO" | jq -r '.author')

            # Decide which base to use by comparing SHA against the newjitsu branch.
            # - "diverged" / "ahead": SHA is NOT in newjitsu history → Path A
            # - "behind" / "identical": SHA IS in newjitsu history → Path B
            local COMPARE_STATUS
            COMPARE_STATUS=$(gh api "repos/$REPO/compare/newjitsu...$SHA" --jq '.status')

            local BASE_REF
            if [ "$COMPARE_STATUS" = "diverged" ] || [ "$COMPARE_STATUS" = "ahead" ]; then
              # Path A: commit is not in newjitsu (e.g. head of a merged PR branch).
              # newjitsu already exists — no branch to push, no permission issues.
              BASE_REF="newjitsu"
            else
              # Path B: commit is in newjitsu (direct push). Use parent as base so the
              # temp PR diff shows exactly what this single commit changed.

              # Guard: if the parent touches .github/workflows/ we cannot push it.
              # GitHub requires `workflows: write` to push commits that modify workflow
              # files, and GITHUB_TOKEN cannot be granted that permission via the
              # `permissions:` block. To unblock this, add a PAT with 'workflow' scope
              # as the WORKFLOW_TOKEN secret and use it for the git push below.
              local WORKFLOW_CHANGES
              WORKFLOW_CHANGES=$(gh api "repos/$REPO/commits/$PARENT" \
                --jq '[.files[].filename | select(startswith(".github/workflows"))] | length')

              if [ "$WORKFLOW_CHANGES" -gt 0 ]; then
                echo "Skipping automated review: parent commit modifies .github/workflows/ files."
                echo "Changes to workflow files must go through a Pull Request for code review."
                echo "To enable automated review of workflow commits, add a classic PAT with"
                echo "'workflow' scope as the WORKFLOW_TOKEN secret and use it for git push."
                exit 0
              fi

              # Push parent commit as the base branch (force to recover from cancelled runs
              # that left stale branches behind)
              git fetch origin "$PARENT" --depth=1
              git push origin FETCH_HEAD:refs/heads/"$BRANCH_BASE" --force
              BASE_REF="$BRANCH_BASE"
            fi

            # Push the commit being reviewed as the head branch
            git fetch origin "$SHA" --depth=1
            git push origin FETCH_HEAD:refs/heads/"$BRANCH_HEAD" --force

            # Build a rich PR body that links back to the original commit
            local PR_BODY
            PR_BODY=$(printf \
              '## Automated code review\n\nTemporary PR for reviewing a commit pushed directly to `newjitsu`.\n**This PR will be closed automatically after the review.**\n\n| Field | Value |\n|-------|-------|\n| Commit | [`%s`](https://github.com/%s/commit/%s) |\n| Message | %s |\n| Author | @%s |' \
              "$SHORT" "$REPO" "$SHA" "$MSG" "$AUTHOR")

            local PR_URL
            PR_URL=$(gh pr create \
              --repo "$REPO" \
              --head "$BRANCH_HEAD" \
              --base "$BASE_REF" \
              --title "Auto-review: $SHORT" \
              --body "$PR_BODY")

            local PR_NUMBER
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')

            # Write outputs. branch_base is empty when Path A (newjitsu) was used —
            # the cleanup step checks for emptiness before attempting deletion.
            echo "pr_number=$PR_NUMBER"    >> $GITHUB_OUTPUT
            echo "is_temp=true"            >> $GITHUB_OUTPUT
            echo "branch_head=$BRANCH_HEAD" >> $GITHUB_OUTPUT
            [ "$BASE_REF" != "newjitsu" ] && echo "branch_base=$BRANCH_BASE" >> $GITHUB_OUTPUT || true
            echo "Created temp PR #$PR_NUMBER — $PR_URL"
          }
          # ── end make_temp_pr ──────────────────────────────────────────────────────

          # ── Event routing ─────────────────────────────────────────────────────────
          # Three trigger paths:
          #   1. pull_request event  → review the PR directly (no temp PR needed)
          #   2. workflow_dispatch with pr_number → review that PR; if closed/merged,
          #      create a temp PR from its head commit
          #   3. push to newjitsu / workflow_dispatch with commit_sha → find an open PR
          #      for the commit or create a temp PR

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Path 1: standard PR review triggered automatically on open/push
            PR_NUMBER="${{ github.event.pull_request.number }}"
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "is_temp=false"        >> $GITHUB_OUTPUT
            echo "subject_url=https://github.com/$REPO/pull/$PR_NUMBER" >> $GITHUB_OUTPUT

          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.pr_number }}" ]; then
            # Path 2: manual re-review of a specific PR
            PR_NUMBER="${{ inputs.pr_number }}"
            STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state -q .state)
            echo "PR #$PR_NUMBER state: $STATE"

            if [ "$STATE" = "OPEN" ]; then
              # PR is still open — review it directly
              echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
              echo "is_temp=false"        >> $GITHUB_OUTPUT
              echo "subject_url=https://github.com/$REPO/pull/$PR_NUMBER" >> $GITHUB_OUTPUT
            else
              # PR is merged or closed — can't post review to it directly.
              # Create a temp PR from the PR's head commit so the plugin has a target.
              HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid -q .headRefOid)
              echo "PR is $STATE — creating temp PR from head $HEAD_SHA"
              make_temp_pr "$HEAD_SHA"

              # Recover temp PR number: make_temp_pr may have appended multiple
              # pr_number= lines (one per nested call); tail -1 gets the last/correct one.
              TEMP_PR_NUMBER=$(grep 'pr_number=' $GITHUB_OUTPUT | tail -1 | cut -d= -f2)
              echo "subject_url=https://github.com/$REPO/pull/$PR_NUMBER"       >> $GITHUB_OUTPUT
              echo "temp_pr_url=https://github.com/$REPO/pull/$TEMP_PR_NUMBER"  >> $GITHUB_OUTPUT

              # Notify on the original PR so reviewers can find the re-review
              gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "Re-review via temp PR: https://github.com/$REPO/pull/$TEMP_PR_NUMBER" \
                2>/dev/null || true
            fi

          else
            # Path 3: push to newjitsu, or dispatch with a raw commit SHA
            SHA="${{ github.sha }}"
            [ "${{ github.event_name }}" = "workflow_dispatch" ] \
              && [ -n "${{ inputs.commit_sha }}" ] \
              && SHA="${{ inputs.commit_sha }}"

            # Check if there is already an open PR for this commit — if so, review it
            # directly instead of creating a redundant temp PR.
            EXISTING_PR=$(gh api "repos/$REPO/commits/$SHA/pulls" \
              -H "Accept: application/vnd.github.groot-preview+json" \
              --jq '[.[] | select(.state == "open")] | .[0].number // empty' \
              2>/dev/null || true)

            if [ -n "$EXISTING_PR" ]; then
              echo "pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
              echo "is_temp=false"          >> $GITHUB_OUTPUT
              echo "subject_url=https://github.com/$REPO/pull/$EXISTING_PR" >> $GITHUB_OUTPUT
            else
              make_temp_pr "$SHA"
              TEMP_PR_NUMBER=$(grep 'pr_number=' $GITHUB_OUTPUT | tail -1 | cut -d= -f2)
              echo "subject_url=https://github.com/$REPO/commit/$SHA"              >> $GITHUB_OUTPUT
              echo "temp_pr_url=https://github.com/$REPO/pull/$TEMP_PR_NUMBER"     >> $GITHUB_OUTPUT
              # Leave a commit comment so the commit page links to the review in progress
              gh api "repos/$REPO/commits/$SHA/comments" \
                -f body="Code review in progress: https://github.com/$REPO/pull/$TEMP_PR_NUMBER"
            fi
          fi

      - name: Print review subject
        run: |
          echo "Subject:  ${{ steps.resolve-pr.outputs.subject_url }}"
          TEMP="${{ steps.resolve-pr.outputs.temp_pr_url }}"
          [ -n "$TEMP" ] && echo "Temp PR:  $TEMP" || true

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Print Claude Code version
        run: claude --version

      - name: Install code-review plugin
        run: |
          # The code-review plugin installs a skill that auto-triggers when Claude sees
          # a review task description. In -p (print) mode, user-invoked slash commands
          # are silently dropped; the skill must be invoked by the model from the prompt.
          claude plugin marketplace update claude-plugins-official 2>/dev/null \
            || claude plugin marketplace add anthropics/claude-plugins-official
          claude plugin install code-review@claude-plugins-official

      - name: Run code review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.resolve-pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
          REVIEW_INSTRUCTIONS: ${{ env.REVIEW_INSTRUCTIONS }}
        run: |
          set -euo pipefail

          # Run review via the code-review skill (auto-invoked from the task description).
          # --allowedTools "Bash(gh:*)" lets Claude call gh CLI to fetch the diff and post
          # review comments directly. --output-format json captures usage stats.
          RESULT=$(claude -p \
            "Review PR #$PR_NUMBER in $REPO. You MUST use the code-review skill to analyze this PR. If the code-review skill is not available, output an error message and stop. Instructions: $REVIEW_INSTRUCTIONS" \
            --output-format json \
            --allowedTools "Bash(gh:*)")

          # Log token usage and cost for cost tracking
          echo "$RESULT" | jq -r '"Tokens: in=\(.usage.input_tokens) out=\(.usage.output_tokens) cache_read=\(.usage.cache_read_input_tokens // 0) cache_write=\(.usage.cache_creation_input_tokens // 0)"'
          echo "$RESULT" | jq -r '"Cost: $\(.cost_usd // "n/a")"'
          echo "--- Claude output ---"
          echo "$RESULT" | jq -r '.result // "(no output)"'

      - name: Cleanup
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER="${{ steps.resolve-pr.outputs.pr_number }}"
          IS_TEMP="${{ steps.resolve-pr.outputs.is_temp }}"
          BRANCH_HEAD="${{ steps.resolve-pr.outputs.branch_head }}"
          BRANCH_BASE="${{ steps.resolve-pr.outputs.branch_base }}"

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR to clean up"
            exit 0
          fi

          if [ "$IS_TEMP" = "true" ]; then
            gh pr close "$PR_NUMBER" --repo "$REPO" 2>/dev/null || true
            echo "Closed temp PR #$PR_NUMBER"
            if [ -n "$BRANCH_HEAD" ]; then
              git push origin --delete "$BRANCH_HEAD" 2>/dev/null || true
              # branch_base is empty when Path A (newjitsu base) was used — skip deletion
              [ -n "$BRANCH_BASE" ] && git push origin --delete "$BRANCH_BASE" 2>/dev/null || true
              echo "Deleted temp branches"
            fi
          fi
