name: 🐳 Build Docker Images and CLI tools

on:
  workflow_call:
    inputs:
      skip_install:
        description: "Skip dependency installation (already done in calling workflow)"
        required: false
        type: boolean
        default: false
      scope:
        description: "Build scope: all, docker, npm"
        required: false
        type: string
        default: "all"
  workflow_dispatch:
    inputs:
      version:
        description: "Manual version override (e.g., 1.2.3-canary.1)"
        required: false
        type: string
      tag:
        description: "Manual tag/channel override (canary, beta, stable)"
        required: false
        type: string
      scope:
        description: "Build scope: all, docker, npm"
        required: false
        type: string
        default: "all"

concurrency:
  # Use a shared concurrency group for both direct runs and calls from lint.yml
  # This ensures only one build runs per branch at a time
  group: services-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: 🏷️ Generate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.manual.outputs.version || steps.generated.outputs.version }}
      channel: ${{ steps.manual.outputs.channel || steps.generated.outputs.channel }}
      tag: ${{ steps.manual.outputs.tag || steps.generated.outputs.tag }}
    steps:
      - name: 📥 Checkout code
        if: ${{ !inputs.version }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🏷️ Generate version
        if: ${{ !inputs.version }}
        id: generated
        uses: ./.github/actions/version
        with:
          version_file: .services.version.json

      - name: 📝 Use manual version
        if: ${{ inputs.version }}
        id: manual
        run: |
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          echo "channel=${{ inputs.tag || 'canary' }}" >> $GITHUB_OUTPUT
          echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT

  build:
    needs: [version]
    if: ${{ inputs.scope == 'all' || inputs.scope == 'docker' }}
    name: 🚀 Build and Release Backend Docker Images
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "jitsucom/newjitsu"

      - name: 📝 Update versions
        if: needs.version.outputs.channel != 'canary'
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          echo "Updating all package.json files to version ${VERSION}"
          find . -name "package.json" -type f ! -path "*/node_modules/*" | while read -r file; do
            jq --arg version "${VERSION}" '.version = $version' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
            echo "Updated: $file"
          done

      - name: 🏗️ Build and push Docker images
        env:
          VERSION: ${{ needs.version.outputs.version }}
          CHANNEL: ${{ needs.version.outputs.channel }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          TARGETS="console rotor profiles"
          REGISTRY="${{ secrets.DOCKERHUB_USERNAME }}"
          SHORT_SHA=$(git rev-parse --short=7 HEAD)

          # Sanitize branch name for Docker tag (lowercase, replace / and _ with -, remove special chars)
          BRANCH_SANITIZED=$(echo "${BRANCH}" | tr '[:upper:]' '[:lower:]' | sed 's/[\/\_]/-/g' | sed 's/[^a-z0-9.-]//g')

          for TARGET in $TARGETS; do
            echo "🚀 Building ${TARGET} for AMD64 and ARM64..."

            # Build tags list
            # 1. Version tag (e.g., 1.2.3-canary.1.20251113.abc1234)
            TAGS="-t ${REGISTRY}/${TARGET}:${VERSION}"

            # 2. Channel-based tag (map stable to "latest")
            if [ "${CHANNEL}" = "stable" ]; then
              TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:latest"
              TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:stable"
            else
              TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:${CHANNEL}"
            fi

            # 3. Branch + commit tag (e.g., feat-a.abc1234)
            TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:${BRANCH_SANITIZED}.${SHORT_SHA}"

            # Use AMD64 only for canary (faster), multi-arch for stable/beta
            if [ "${CHANNEL}" = "canary" ]; then
              PLATFORM="linux/amd64,linux/arm64"
            else
              #PLATFORM="linux/amd64"
              PLATFORM="linux/amd64,linux/arm64"
            fi

            docker buildx build \
              --target ${TARGET} \
              --platform ${PLATFORM} \
              --build-arg JITSU_BUILD_VERSION=${VERSION} \
              --build-arg JITSU_BUILD_DOCKER_TAG=${CHANNEL} \
              --build-arg JITSU_BUILD_COMMIT_SHA=${COMMIT_SHA} \
              --build-arg CI=true \
              ${TAGS} \
              -f all.Dockerfile \
              --push \
              .
          done

      - name: 🏷️ Create and push git tag
        if: needs.version.outputs.channel != 'canary'
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          VERSION="${{ needs.version.outputs.version }}"

          # Configure git user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create annotated tag
          git tag -a "$TAG" -m "Release $VERSION"

          # Push tag using GITHUB_TOKEN
          git push origin "$TAG"

          echo "Created and pushed tag: $TAG"

      - name: 📝 Create GitHub release
        if: needs.version.outputs.channel != 'canary'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          VERSION="${{ needs.version.outputs.version }}"
          CHANNEL="${{ needs.version.outputs.channel }}"

          # Determine if prerelease
          PRERELEASE_FLAG=""
          if [ "$CHANNEL" = "beta" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Create release without notes
          gh release create "$TAG" --notes "$VERSION ($CHANNEL)" --title "Jitsu Release $VERSION" $PRERELEASE_FLAG

          echo "Created GitHub release: $TAG"

      - name: 📢 Notify release
        id: notify
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
        run: |
          gh workflow run new-release-notify.yaml \
            --repo jitsucom/jitsu-cloud-infra \
            --ref main \
            -f release_type=jitsu-services \
            -f channel=${{ needs.version.outputs.channel }} \
            -f version=${{ needs.version.outputs.version }} \
            -f triggerAuthor=${{ github.actor }} \
            -f triggerUrl=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          # Wait for the workflow run to be created
          sleep 3

          # Get the latest run URL using curl
          DEPLOY_RUN_URL=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DEPLOY_GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/jitsucom/jitsu-cloud-infra/actions/workflows/new-release-notify.yaml/runs?per_page=1" \
            | jq -r '.workflow_runs[0].html_url')

          echo "deploy_run_url=${DEPLOY_RUN_URL}" >> $GITHUB_OUTPUT

      - name: 📝 Get short SHA
        if: always()
        id: short-sha
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: 💬 Send notification to Slack
        if: always()
        uses: ./.github/actions/slack-notify
        with:
          slack_webhook_url: ${{ secrets.CI_SLACK_WEBHOOK }}
          color: ${{ job.status == 'success' && '#36a64f' || '#ff0000' }}
          header: "${{ job.status == 'success' && '✅' || '❌' }} 🐳 Jitsu Services `${{ needs.version.outputs.channel || 'unknown' }}` build ${{ job.status == 'success' && 'SUCCEEDED' || 'FAILED' }}"
          blocks: |
            - title: Branch
              value: ${{ github.ref_name }}
            - title: Version
              value: ${{ needs.version.outputs.version || 'N/A' }}
            - title: Commit
              value: ${{ steps.short-sha.outputs.sha }}
              url: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
            - title: Commit message
              value: ${{ github.event.head_commit.message && toJSON(github.event.head_commit.message) || 'N/A' }}
              is_code: true
            - title: Build workflow
              value: ${{ job.status == 'success' && 'View workflow run' || 'View failed run' }}
              url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - title: ${{ job.status == 'success' && 'Deploy lifecycle' || 'Triggered by' }}
              value: ${{ job.status == 'success' && 'View deployment run' || github.actor }}
              url: ${{ job.status == 'success' && steps.notify.outputs.deploy_run_url || '' }}

  npm-publish:
    needs: [version]
    if: ${{ inputs.scope == 'all' || inputs.scope == 'npm' }}
    name: 📦 Build and Publish NPM Packages
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🔍 Validate NPM token
        env:
          NPM_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: |
          echo "Validating NPM token..."
          WHOAMI=$(curl -s -H "Authorization: Bearer ${NPM_TOKEN}" https://registry.npmjs.org/-/whoami)
          echo "Authenticated as: ${WHOAMI}"
          if [ -z "${WHOAMI}" ] || [ "${WHOAMI}" = "null" ]; then
            echo "ERROR: Invalid NPM token"
            exit 1
          fi

      - name: 🐳 Pull and start builder container
        run: |
          docker pull ghcr.io/jitsucom/jitsu-builder:latest
          docker run -d --name builder -v ${{ github.workspace }}:/workspace -w /workspace -e CI=true ghcr.io/jitsucom/jitsu-builder:latest tail -f /dev/null

      - name: 🔐 Configure npm authentication
        env:
          NPM_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: |
          docker exec -e NPM_TOKEN builder sh -c "echo '//registry.npmjs.org/:_authToken='\${NPM_TOKEN} >> /workspace/.npmrc"

      - name: 🔐 Validate npm authentication
        run: |
          docker exec builder npm whoami || {
            echo "npm whoami failed, dumping debug logs:"
            docker exec builder sh -c "cat /root/.npm/_logs/*.log"
            exit 1
          }

      - name: 📦 Fetch dependencies from store
        run: |
          docker exec builder sh -c 'echo "pnpm store path: $(pnpm store path)"'
          docker exec builder pnpm fetch

      - name: 📦 Install dependencies
        if: ${{ !inputs.skip_install }}
        run: docker exec builder pnpm install --frozen-lockfile --offline

      - name: 📝 Update package versions
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          echo "Updating package.json files to version ${VERSION}"

          # Update CLI
          docker exec builder sh -c "cd cli/jitsu-cli && jq --arg version \"${VERSION}\" '.version = \$version' package.json > package.json.tmp && mv package.json.tmp package.json"

          # Update Functions Library
          docker exec builder sh -c "cd libs/functions && jq --arg version \"${VERSION}\" '.version = \$version' package.json > package.json.tmp && mv package.json.tmp package.json"

          echo "Updated versions:"
          docker exec builder sh -c "cd cli/jitsu-cli && cat package.json | grep version"
          docker exec builder sh -c "cd libs/functions && cat package.json | grep version"

      - name: 🏗️ Build packages
        run: docker exec builder pnpm --filter jitsu-cli --filter @jitsu/functions-lib build


      - name: 📤 Publish to NPM
        env:
          CHANNEL: ${{ needs.version.outputs.channel }}
        run: |
          # Determine NPM tag based on channel
          if [ "${CHANNEL}" = "stable" ]; then
            NPM_TAG="latest"
          else
            NPM_TAG="${CHANNEL}"
          fi

          echo "Publishing packages to NPM with tag: ${NPM_TAG}"

          # Publish jitsu-cli
          echo "Publishing jitsu-cli..."
          docker exec builder sh -c "cd cli/jitsu-cli && npm publish --tag ${NPM_TAG} --access public"

          # Publish @jitsu/functions-lib
          echo "Publishing @jitsu/functions-lib..."
          docker exec builder sh -c "cd libs/functions && npm publish --tag ${NPM_TAG} --access public"

      - name: 🧹 Cleanup container
        if: always()
        run: docker stop builder && docker rm builder

      - name: 📝 Get short SHA
        if: always()
        id: short-sha
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: 💬 Send notification to Slack
        if: always()
        uses: ./.github/actions/slack-notify
        with:
          slack_webhook_url: ${{ secrets.CI_SLACK_WEBHOOK }}
          color: ${{ job.status == 'success' && '#36a64f' || '#ff0000' }}
          header: "${{ job.status == 'success' && '✅' || '❌' }} 📦 NPM Packages `${{ needs.version.outputs.channel || 'unknown' }}` publish ${{ job.status == 'success' && 'SUCCEEDED' || 'FAILED' }}"
          blocks: |
            - title: Branch
              value: ${{ github.ref_name }}
            - title: Version
              value: ${{ needs.version.outputs.version || 'N/A' }}
            - title: NPM Tag
              value: ${{ needs.version.outputs.channel == 'stable' && 'latest' || needs.version.outputs.channel }}
            - title: Packages
              value: "jitsu-cli, @jitsu/functions-lib"
            - title: Commit
              value: ${{ steps.short-sha.outputs.sha }}
              url: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
            - title: Commit message
              value: ${{ github.event.head_commit.message && toJSON(github.event.head_commit.message) || 'N/A' }}
              is_code: true
            - title: Workflow run
              value: ${{ job.status == 'success' && 'View workflow run' || 'View failed run' }}
              url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - title: Triggered by
              value: ${{ github.actor }}
