name: Backend Build

on:
  workflow_call:
    inputs:
      branch:
        description: "Branch to build from"
        required: true
        type: string
      skip_install:
        description: "Skip dependency installation (already done in calling workflow)"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from"
        required: true
        type: string

jobs:
  build:
    name: Build and Release Backend Docker Images
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: 🔍 Determine release channel
        id: channel
        run: |
          BRANCH="${{ inputs.branch }}"
          if [ "$BRANCH" = "stable-services" ]; then
            echo "channel=stable" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "newjitsu" ]; then
            echo "channel=beta" >> $GITHUB_OUTPUT
          else
            echo "channel=canary" >> $GITHUB_OUTPUT
          fi

      - name: 🐳 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📦 Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: 💾 Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 💾 Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: 📦 Install dependencies
        if: ${{ !inputs.skip_install }}
        run: pnpm install --frozen-lockfile

      - name: 🏷️ Generate version with semantic-release
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm exec semantic-release --extends ./.releaserc.server.json
          VERSION=$(cat /tmp/semantic-release-version.txt)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: 📝 Update versions
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Updating all package.json files to version ${VERSION}"
          find . -name "package.json" -type f ! -path "*/node_modules/*" | while read -r file; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$file', 'utf8'));
              pkg.version = process.env.VERSION;
              fs.writeFileSync('$file', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "Updated: $file"
          done

      - name: 🚀 Push tags
        run: git push --follow-tags origin

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and push Docker images
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHANNEL: ${{ steps.channel.outputs.channel }}
          BRANCH: ${{ inputs.branch }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          TARGETS="console rotor profiles"
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          SHORT_SHA=$(git rev-parse --short=7 HEAD)

          # Sanitize branch name for Docker tag (lowercase, replace / and _ with -, remove special chars)
          BRANCH_SANITIZED=$(echo "${BRANCH}" | tr '[:upper:]' '[:lower:]' | sed 's/[\/\_]/-/g' | sed 's/[^a-z0-9.-]//g')

          for TARGET in $TARGETS; do
            echo "🚀 Building ${TARGET} for AMD64 and ARM64..."

            # Build tags list
            # 1. Version tag (e.g., 1.2.3-canary.1.20251113.abc1234)
            TAGS="-t ${REGISTRY}/${TARGET}:${VERSION}"

            # 2. Channel-based tag (map stable to "latest")
            if [ "${CHANNEL}" = "stable" ]; then
              TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:latest"
              TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:stable"
            else
              TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:${CHANNEL}"
            fi

            # 3. Branch + commit tag (e.g., feat-a.abc1234)
            TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:${BRANCH_SANITIZED}.${SHORT_SHA}"

            docker buildx build \
              --target ${TARGET} \
              --platform linux/amd64,linux/arm64 \
              --build-arg JITSU_BUILD_VERSION=${VERSION} \
              --build-arg JITSU_BUILD_DOCKER_TAG=${CHANNEL} \
              --build-arg JITSU_BUILD_COMMIT_SHA=${COMMIT_SHA} \
              --cache-from type=registry,ref=${REGISTRY}/${TARGET}:buildcache \
              --cache-to type=registry,ref=${REGISTRY}/${TARGET}:buildcache,mode=max \
              ${TAGS} \
              -f all.Dockerfile \
              --push \
              .
          done

      - name: 📢 Notify release
        id: notify
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
        run: |
          gh workflow run new-release-notify.yaml \
            --repo jitsucom/jitsu-cloud-infra \
            --ref main \
            -f release_type=jitsu-services \
            -f channel=${{ steps.channel.outputs.channel }} \
            -f version=${{ steps.version.outputs.version }} \
            -f triggerAuthor=${{ github.actor }} \
            -f triggerUrl=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          # Wait for the workflow run to be created
          sleep 3

          # Get the latest run URL
          DEPLOY_RUN_URL=$(gh run list \
            --repo jitsucom/jitsu-cloud-infra \
            --workflow new-release-notify.yaml \
            --limit 1 \
            --json url \
            --jq '.[0].url')

          echo "deploy_run_url=${DEPLOY_RUN_URL}" >> $GITHUB_OUTPUT

      - name: 💬 Send notification to Slack
        if: always()
        uses: ./.github/actions/slack-notify
        with:
          slack_webhook_url: ${{ secrets.CI_SLACK_WEBHOOK }}
          color: ${{ job.status == 'success' && '#36a64f' || '#ff0000' }}
          header: "${{ job.status == 'success' && '✅' || '❌' }} jitsu-services [${{ steps.channel.outputs.channel }}] build ${{ job.status == 'success' && 'SUCCEEDED' || 'FAILED' }}"
          blocks: |
            - title: Version
              value: ${{ steps.version.outputs.version }}
            - title: Commit
              value: ${{ github.sha }}
              url: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
            - title: Commit message
              value: ${{ toJSON(github.event.head_commit.message) }}
              is_code: true
            - title: Build workflow
              value: ${{ job.status == 'success' && 'View workflow run' || 'View failed run' }}
              url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - title: ${{ job.status == 'success' && 'Deploy lifecycle' || 'Triggered by' }}
              value: ${{ job.status == 'success' && 'View deployment run' || github.actor }}
              url: ${{ job.status == 'success' && steps.notify.outputs.deploy_run_url || '' }}

      - name: 📊 Summary
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ inputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Channel**: ${{ steps.channel.outputs.channel }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.notify.outputs.deploy_run_url }}" ]; then
            echo "- **Deploy workflow**: ${{ steps.notify.outputs.deploy_run_url }}" >> $GITHUB_STEP_SUMMARY
          fi
