name: 🐳 Services and CLI Build

on:
  # No push trigger: this workflow is invoked by publish.yml (workflow_call) or
  # manually via the Actions UI (workflow_dispatch). All trigger logic lives in
  # publish.yml.
  workflow_call:
    inputs:
      channel:
        description: "Release channel: canary, beta, stable"
        required: true
        type: string
      version:
        description: "Manual version override (e.g., 1.2.3-canary.1)"
        required: false
        type: string
      scope:
        description: "Build scope: all, nodejs, bulker, npm"
        required: false
        type: string
        default: "all"
      dont_publish:
        description: "Build only, no registry pushes or tag creation"
        required: false
        type: boolean
        default: false
      skip_install:
        description: "Skip dependency installation (already done in calling workflow)"
        required: false
        type: boolean
        default: false
      fast_fail:
        description: "Cancel the whole run as soon as any critical job fails (used by cross-repo callers that wait on this workflow)"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        type: choice
        options: [canary, beta, stable]
        default: canary
      version:
        description: "Manual version override (e.g., 1.2.3-canary.1)"
        required: false
        type: string
      scope:
        description: "Build scope"
        type: choice
        options: [all, nodejs, bulker, npm]
        default: all
      dont_publish:
        description: "Build only, no registry pushes or tag creation"
        required: false
        type: boolean
        default: false
      fast_fail:
        description: "Cancel the whole run as soon as any critical job fails"
        required: false
        type: boolean
        default: false

concurrency:
  # One services build per ref at a time.
  group: services-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: 🏷️ Generate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.manual.outputs.version || steps.generated.outputs.version }}
      channel: ${{ inputs.channel }}
      tag: ${{ steps.manual.outputs.tag || steps.generated.outputs.tag }}
      short_sha: ${{ steps.short-sha.outputs.sha }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🏷️ Generate version
        if: ${{ !inputs.version }}
        id: generated
        uses: ./.github/actions/version
        with:
          version_file: .services.version.json
          channel: ${{ inputs.channel }}

      - name: 📝 Use manual version
        if: ${{ inputs.version }}
        id: manual
        run: |
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: 📝 Get short SHA
        id: short-sha
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: 📝 Write version file for cross-repo callers
        # Cross-repo callers (e.g. jitsu-cloud-infra's deploy workflow) need
        # the resolved Docker tag back. workflow_dispatch doesn't expose
        # outputs across repos, so we ship it as an artifact instead.
        env:
          VERSION: ${{ steps.manual.outputs.version || steps.generated.outputs.version }}
        run: printf '%s' "$VERSION" > /tmp/version.txt

      - name: 📤 Upload version artifact
        uses: actions/upload-artifact@v4
        with:
          name: version
          path: /tmp/version.txt
          if-no-files-found: error
          retention-days: 7

  nodejs_build:
    needs: [version]
    if: ${{ inputs.scope == 'all' || inputs.scope == 'nodejs' }}
    name: 🚀 Build and Release Nodejs Services
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: cloud
          endpoint: "jitsucom/newjitsu"

      - name: 📝 Update versions
        if: ${{ needs.version.outputs.channel != 'canary' }}
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          echo "Updating all package.json files to version ${VERSION}"
          find . -name "package.json" -type f ! -path "*/node_modules/*" | while read -r file; do
            jq --arg version "${VERSION}" '.version = $version' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
            echo "Updated: $file"
          done

      - name: 🏗️ Build and push Docker images
        env:
          VERSION: ${{ needs.version.outputs.version }}
          CHANNEL: ${{ needs.version.outputs.channel }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          TARGETS="console rotor functions-server"
          REGISTRY="${{ secrets.DOCKERHUB_USERNAME }}"
          SHORT_SHA=$(git rev-parse --short=7 HEAD)

          # Sanitize branch name for Docker tag (lowercase, replace / and _ with -, remove special chars)
          BRANCH_SANITIZED=$(echo "${BRANCH}" | tr '[:upper:]' '[:lower:]' | sed 's/[\/\_]/-/g' | sed 's/[^a-z0-9.-]//g')

          for TARGET in $TARGETS; do
            # Build tags list
            # 1. Version tag (e.g., 1.2.3-canary.1.20251113.abc1234)
            TAGS="-t ${REGISTRY}/${TARGET}:${VERSION}"

            # 2. Channel-based tag (map stable to "latest")
            if [ "${CHANNEL}" = "stable" ]; then
              TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:latest"
              TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:stable"
            else
              TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:${CHANNEL}"
            fi

            # 3. Branch + commit tag (e.g., feat-a.abc1234)
            TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:${BRANCH_SANITIZED}.${SHORT_SHA}"

            # Add --push flag only if we're publishing
            if [ "${{ inputs.dont_publish }}" != "true" ]; then
              GOAL_FLAG="--push"
              PLATFORM="linux/amd64,linux/arm64"
            else
              GOAL_FLAG=""
              PLATFORM="linux/arm64"
            fi
          
            echo "🚀 Building ${TARGET} for ${PLATFORM}..."

            docker buildx build \
              --target ${TARGET} \
              --platform ${PLATFORM} \
              --build-arg JITSU_BUILD_VERSION=${VERSION} \
              --build-arg JITSU_BUILD_DOCKER_TAG=${CHANNEL} \
              --build-arg JITSU_BUILD_COMMIT_SHA=${COMMIT_SHA} \
              --build-arg CI=true \
              ${TAGS} \
              -f all.Dockerfile \
              ${GOAL_FLAG} \
              .
          done

      - name: 🛑 Cancel run on failure (fast_fail)
        if: ${{ failure() && inputs.fast_fail }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}

  build_bulker:
    needs: [version]
    if: ${{ inputs.scope == 'all' || inputs.scope == 'bulker' }}
    name: 🚀 Build and Release Bulker Docker Images
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: cloud
          endpoint: "jitsucom/newjitsu"

      - name: 🏗️ Build and push Bulker Docker images
        env:
          VERSION: ${{ needs.version.outputs.version }}
          CHANNEL: ${{ needs.version.outputs.channel }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          TARGETS="bulker ingest sidecar syncctl operator ingmgr cfgkpr admin reprocessing-worker"
          REGISTRY="${{ secrets.DOCKERHUB_USERNAME }}"
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Sanitize branch name for Docker tag (lowercase, replace / and _ with -, remove special chars)
          BRANCH_SANITIZED=$(echo "${BRANCH}" | tr '[:upper:]' '[:lower:]' | sed 's/[\/\_]/-/g' | sed 's/[^a-z0-9.-]//g')

          for TARGET in $TARGETS; do
            # Build tags list
            # 1. Version tag (e.g., 1.2.3-canary.1.20251113.abc1234)
            TAGS="-t ${REGISTRY}/${TARGET}:${VERSION}"

            # 2. Channel-based tag (map stable to "latest")
            if [ "${CHANNEL}" = "stable" ]; then
              TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:latest"
              TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:stable"
            else
              TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:${CHANNEL}"
            fi

            # 3. Branch + commit tag (e.g., feat-a.abc1234)
            TAGS="${TAGS} -t ${REGISTRY}/${TARGET}:${BRANCH_SANITIZED}.${SHORT_SHA}"
            
            # Add --push flag only if we're publishing
            if [ "${{ inputs.dont_publish }}" != "true" ]; then
              GOAL_FLAG="--push"
              PLATFORM="linux/amd64,linux/arm64"
            else
              GOAL_FLAG=""
              PLATFORM="linux/arm64"
            fi
          
            echo "🚀 Building ${TARGET} for ${PLATFORM}..."

            docker buildx build \
              --target ${TARGET} \
              --platform ${PLATFORM} \
              --build-arg VERSION=${VERSION} \
              --build-arg BUILD_TIMESTAMP=${BUILD_TIMESTAMP} \
              ${TAGS} \
              -f bulker/all.Dockerfile \
              ${GOAL_FLAG} \
              ./bulker
          done

      - name: 🛑 Cancel run on failure (fast_fail)
        if: ${{ failure() && inputs.fast_fail }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}

  tag_release:
    needs: [version, nodejs_build, build_bulker, npm_publish]
    if: ${{ !inputs.dont_publish && needs.version.outputs.channel != 'canary' && !cancelled() && (needs.nodejs_build.result == 'success' || needs.build_bulker.result == 'success' || needs.npm_publish.result == 'success') }}
    name: 🏷️ Tag Release
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🏷️ Create and push git tag
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          VERSION="${{ needs.version.outputs.version }}"

          # Configure git user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create annotated tag
          git tag -a "$TAG" -m "Release $VERSION"

          # Push tag using GITHUB_TOKEN
          git push origin "$TAG"

          echo "Created and pushed tag: $TAG"

  finalize_release:
    needs: [version, nodejs_build, build_bulker, npm_publish, tag_release]
    if: ${{ !inputs.dont_publish && needs.version.outputs.channel != 'canary' && !cancelled() && needs.tag_release.result == 'success' && (needs.nodejs_build.result == 'success' || needs.nodejs_build.result == 'skipped') && (needs.build_bulker.result == 'success' || needs.build_bulker.result == 'skipped') && (needs.npm_publish.result == 'success' || needs.npm_publish.result == 'skipped') }}
    name: 🏷️ Finalize Release
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 📝 Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          VERSION="${{ needs.version.outputs.version }}"
          CHANNEL="${{ needs.version.outputs.channel }}"

          # Determine if prerelease
          PRERELEASE_FLAG=""
          if [ "$CHANNEL" = "beta" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Create release without notes
          gh release create "$TAG" --notes "$VERSION ($CHANNEL)" --title "Jitsu Release $VERSION" $PRERELEASE_FLAG

          echo "Created GitHub release: $TAG"

      - name: 📢 Notify release
        id: notify
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
        run: |
          gh workflow run new-release-notify.yaml \
            --repo jitsucom/jitsu-cloud-infra \
            --ref main \
            -f release_type=jitsu-services \
            -f channel=${{ needs.version.outputs.channel }} \
            -f version=${{ needs.version.outputs.version }} \
            -f triggerAuthor=${{ github.actor }} \
            -f triggerUrl=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          # Wait for the workflow run to be created
          sleep 3

          # Get the latest run URL using curl
          DEPLOY_RUN_URL=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DEPLOY_GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/jitsucom/jitsu-cloud-infra/actions/workflows/new-release-notify.yaml/runs?per_page=1" \
            | jq -r '.workflow_runs[0].html_url')

          echo "deploy_run_url=${DEPLOY_RUN_URL}" >> $GITHUB_OUTPUT

      - name: 💬 Send notification to Slack
        if: always()
        uses: ./.github/actions/slack-notify
        with:
          slack_webhook_url: ${{ secrets.CI_SLACK_WEBHOOK }}
          color: ${{ job.status == 'success' && '#36a64f' || '#ff0000' }}
          header: "${{ job.status == 'success' && '✅' || '❌' }} 🏷️ Jitsu `${{ needs.version.outputs.channel || 'unknown' }}` release ${{ job.status == 'success' && 'SUCCEEDED' || 'FAILED' }}"
          blocks: |
            - title: Branch
              value: ${{ github.ref_name }}
            - title: Version
              value: ${{ needs.version.outputs.version || 'N/A' }}
            - title: Tag
              value: ${{ needs.version.outputs.tag || 'N/A' }}
            - title: NPM Tag
              value: ${{ needs.npm_publish.result == 'success' && (needs.version.outputs.channel == 'stable' && 'latest' || needs.version.outputs.channel) || 'Not published' }}
            - title: Commit
              value: ${{ needs.version.outputs.short_sha }}
              url: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
            - title: Commit message
              value: ${{ github.event.head_commit.message && toJSON(github.event.head_commit.message) || 'N/A' }}
              is_code: true
            - title: Workflow run
              value: ${{ job.status == 'success' && 'View workflow run' || 'View failed run' }}
              url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - title: ${{ job.status == 'success' && 'Deploy lifecycle' || 'Triggered by' }}
              value: ${{ job.status == 'success' && 'View deployment run' || github.actor }}
              url: ${{ job.status == 'success' && steps.notify.outputs.deploy_run_url || '' }}

  npm_publish:
    needs: [version]
    if: ${{ inputs.scope == 'all' || inputs.scope == 'npm' }}
    name: 📦 Build and Publish NPM Packages
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🔍 Validate OIDC token and npm access
        run: |
          OIDC_TOKEN=$(curl -sf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm%3Aregistry.npmjs.org" | jq -r '.value')
          if [ -z "${OIDC_TOKEN}" ] || [ "${OIDC_TOKEN}" = "null" ]; then
            echo "ERROR: Could not obtain OIDC token - check that id-token: write permission is set on this job"
            exit 1
          fi
          echo "OIDC token obtained"
          FAILED=0
          for PKG in "jitsu-cli" "@jitsu/functions-lib"; do
            ENCODED=$(printf '%s' "$PKG" | sed 's/@/%40/g; s|/|%2F|g')
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST -H "Authorization: Bearer ${OIDC_TOKEN}" "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/${ENCODED}")
            if [ "${HTTP}" != "201" ]; then
              echo "ERROR: npm OIDC exchange failed (HTTP ${HTTP}) for ${PKG} - check trusted publisher config on npmjs.com"
              FAILED=1
            else
              echo "OK: ${PKG}"
            fi
          done
          [ "${FAILED}" = "0" ] || exit 1

      - name: 🐳 Pull and start builder container
        run: |
          docker pull jitsucom/jitsu-builder:latest
          docker run -d --name builder -v ${{ github.workspace }}:/workspace -w /workspace \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e ACTIONS_ID_TOKEN_REQUEST_URL \
            -e ACTIONS_ID_TOKEN_REQUEST_TOKEN \
            -e GITHUB_REF \
            -e GITHUB_SHA \
            -e GITHUB_REPOSITORY \
            -e GITHUB_REPOSITORY_ID \
            -e GITHUB_REPOSITORY_OWNER_ID \
            -e GITHUB_SERVER_URL \
            -e GITHUB_EVENT_NAME \
            -e GITHUB_RUN_ID \
            -e GITHUB_RUN_ATTEMPT \
            -e GITHUB_WORKFLOW_REF \
            -e RUNNER_ENVIRONMENT \
            jitsucom/jitsu-builder:latest tail -f /dev/null

      - name: 📦 Fetch dependencies from store
        run: |
          docker exec builder sh -c 'echo "pnpm store path: $(pnpm store path)"'
          docker exec builder pnpm fetch

      - name: 📦 Install dependencies
        if: ${{ !inputs.skip_install }}
        run: docker exec builder pnpm install --frozen-lockfile --offline

      - name: 📝 Update package versions
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          echo "Updating package.json files to version ${VERSION}"

          # Update CLI
          docker exec builder sh -c "cd cli/jitsu-cli && jq --arg version \"${VERSION}\" '.version = \$version' package.json > package.json.tmp && mv package.json.tmp package.json"
          
          # Update Types
          docker exec builder sh -c "cd types/protocols && jq --arg version \"${VERSION}\" '.version = \$version' package.json > package.json.tmp && mv package.json.tmp package.json"

          # Update Functions Library
          docker exec builder sh -c "cd libs/functions && jq --arg version \"${VERSION}\" '.version = \$version' package.json > package.json.tmp && mv package.json.tmp package.json"

          echo "Updated versions:"
          docker exec builder sh -c "cd cli/jitsu-cli && cat package.json | grep version"
          docker exec builder sh -c "cd types/protocols && cat package.json | grep version"
          docker exec builder sh -c "cd libs/functions && cat package.json | grep version"

      - name: 🏗️ Build packages
        run: docker exec builder pnpm --filter jitsu-cli --filter @jitsu/functions-lib build


      - name: 📤 Publish to NPM
        env:
          CHANNEL: ${{ needs.version.outputs.channel }}
          DONT_PUBLISH: ${{ inputs.dont_publish }}
        run: |
          if [ "${CHANNEL}" = "stable" ]; then
            NPM_TAG="latest"
          else
            NPM_TAG="${CHANNEL}"
          fi

          DRY_RUN_FLAG=""
          if [ "${DONT_PUBLISH}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
            echo "Running in DRY-RUN mode - packages will NOT be published"
          else
            echo "Publishing packages to NPM with tag: ${NPM_TAG}"
          fi

          docker exec builder sh -c "cd cli/jitsu-cli && npm publish --tag ${NPM_TAG} --access public --provenance ${DRY_RUN_FLAG}"
          docker exec builder sh -c "cd libs/functions && npm publish --tag ${NPM_TAG} --access public --provenance ${DRY_RUN_FLAG}"

      - name: 🧹 Cleanup container
        if: always()
        run: docker stop builder && docker rm builder

      - name: 🛑 Cancel run on failure (fast_fail)
        if: ${{ failure() && inputs.fast_fail }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
