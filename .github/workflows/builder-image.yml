# Build Builder Image
#
# This workflow builds and publishes the jitsu-builder Docker image to GitHub Container Registry (GHCR).
#
# WHY WE NEED THIS:
# The jitsu-builder image contains all dependencies needed for CI builds and tests:
# - Node.js 24 (our runtime)
# - pnpm 10 (our package manager)
# - Pre-fetched pnpm dependencies in /root/.local/share/pnpm/store (standard location)
# - Playwright with pre-installed browser binaries (for E2E tests)
#
# By pre-installing these dependencies, we significantly speed up CI workflows.
# Without this image, each CI run would need to download all packages (~3000+) and install Playwright browsers (~500MB).
#
# HOW IT'S USED:
# - The lint.yml workflow uses this image as a container for running builds, tests, and linting
# - Workflow triggers: automatically on changes to builder.Dockerfile on newjitsu branch, or manually via workflow_dispatch
# - Publishes to: <owner>/jitsu-builder:latest
# - Uses GitHub Actions cache backend (type=gha) for fast layer caching (up to 10GB per repo)
#
name: 👷🏼‍Builder Image

on:
  push:
    branches:
      - newjitsu
    paths:
      - builder.Dockerfile
      - .github/workflows/builder-image.yml
      - pnpm-lock.yaml
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ Build and Push Builder Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: cloud
          endpoint: "jitsucom/newjitsu"

      - name: 📝 Get short SHA
        id: short-sha
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: builder.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ github.repository_owner }}/jitsu-builder:latest
            ${{ github.repository_owner }}/jitsu-builder:${{ steps.short-sha.outputs.sha }}
