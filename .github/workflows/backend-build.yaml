name: Backend Build

on:
  push:
    branches:
      - newjitsu         # Default branch - beta channel
      - stable-services  # Stable channel

env:
  BETA_BRANCH: newjitsu
  STABLE_BRANCH: stable-services

jobs:
  build:
    name: Build and Release Backend Docker Images
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Determine release channel
        id: channel
        run: |
          if [ "${{ github.ref }}" = "refs/heads/${{ env.BETA_BRANCH }}" ]; then
            echo "channel=beta" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/${{ env.STABLE_BRANCH }}" ]; then
            echo "channel=stable" >> $GITHUB_OUTPUT
          fi

      - name: Generate version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.channel.outputs.channel }}" = "beta" ]; then
            pnpm exec semantic-release --dry-run --extends ./.releaserc.server.json > /tmp/release-output.txt
            BASE_VERSION=$(cat /tmp/release-output.txt | grep "The next release version is" | sed 's/.*The next release version is //')
            TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
            SHORT_SHA=$(git rev-parse --short=7 HEAD)
            VERSION="${BASE_VERSION}-beta.${TIMESTAMP}.${SHORT_SHA}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          else
            pnpm exec semantic-release --extends ./.releaserc.server.json
            VERSION=$(cat /tmp/semantic-release-version.txt)
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker Images
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          echo "Building Docker images with version: ${VERSION} and channel: ${CHANNEL}"
          # Add your docker build commands here

      - name: Summary
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Channel**: ${{ steps.channel.outputs.channel }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
