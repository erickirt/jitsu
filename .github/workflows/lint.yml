name: Jitsu Lint and Test
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  # The jitsu-builder container has Playwright browsers binaries preinstalled on this path:
  PLAYWRIGHT_BROWSERS_PATH: /root/.cache/ms-playwright
  BETA_BRANCH: newjitsu
  STABLE_BRANCH: stable-services

jobs:
  build:
    name: 🏗️ Build Project
    # Uses our custom builder image with Node 22, pnpm 9, and Playwright pre-installed
    # See builder.Dockerfile and build-builder-image.yml for details
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🚀 Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-newjitsu-
            ${{ runner.os }}-turbo-

      - name: 🐳 Pull and start builder container
        run: |
          docker pull ghcr.io/jitsucom/jitsu-builder:latest
          docker run -d --name builder -v ${{ github.workspace }}:/workspace -w /workspace -e PLAYWRIGHT_BROWSERS_PATH=/root/.cache/ms-playwright ghcr.io/jitsucom/jitsu-builder:latest tail -f /dev/null

      - name: 📦 Install dependencies
        run: docker exec builder pnpm install --frozen-lockfile

      - name: ✨ Check code format
        run: docker exec builder pnpm format:check:all

      - name: 🔍 Run linter
        run: docker exec builder pnpm lint

      - name: 🏗️ Build packages
        run: docker exec builder pnpm build

      - name: 🧪 Run tests
        run: docker exec builder pnpm test


      - name: 🎭 Run Playwright tests
        run: docker exec builder pnpm test:playwright

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          path: libs/jitsu-js/playwright/artifacts
          name: artifacts/@jitsu/js
          retention-days: 30

      - name: 🧹 Cleanup container
        if: always()
        run: docker stop builder && docker rm builder

      - name: 💬 Send notification to Slack
        if: always() && github.ref == format('refs/heads/{0}', env.BETA_BRANCH)
        uses: ./.github/actions/slack-notify
        with:
          slack_webhook_url: ${{ secrets.CI_SLACK_WEBHOOK }}
          color: ${{ job.status == 'success' && 'good' || 'danger' }}
          header: "Jitsu Lint and Test [${{ github.ref_name }}] ${{ job.status == 'success' && 'successful' || 'failed' }}"
          blocks: |
            - title: Commit
              value: ${{ github.sha }}
              url: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
            - title: Commit message
              value: ${{ toJSON(github.event.head_commit.message) }}
              is_code: true
            - title: Workflow run
              value: ${{ job.status == 'success' && 'View workflow run' || 'View failed run' }}
              url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - title: Triggered by
              value: ${{ github.actor }}

  deploy:
    name: 🐳 Build Docker Images
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/newjitsu' || github.ref == 'refs/heads/stable-services')
    uses: ./.github/workflows/services-build.yaml
    secrets: inherit
    with:
      channel: ${{ github.ref == 'refs/heads/newjitsu' && 'beta' || 'stable' }}
      skip_install: true
