name: 🔒 Security Vulnerability Fix

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 8:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (report only, no PRs)"
        required: false
        type: boolean
        default: false
      severity:
        description: "Minimum severity to fix"
        required: false
        type: choice
        options:
          - low
          - moderate
          - high
          - critical
        default: moderate

concurrency:
  group: security-fix
  cancel-in-progress: false

jobs:
  scan-and-fix:
    name: 🔍 Scan & Fix Vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      security-events: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: newjitsu

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🔧 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "bulker/**/*.sum"

      - name: 📦 Install dependencies
        if: false
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: 🔍 Run npm audit
        id: npm-audit
        if: false
        run: |
          pnpm audit --json > .npm-audit.json 2>/dev/null || true
          echo "npm audit complete"
          # Summary for logs
          jq -r '.advisories // {} | length' .npm-audit.json 2>/dev/null || echo "0"

      - name: 🔍 Run govulncheck
        id: go-vuln
        if: false
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          mkdir -p .go-vulns

          for moddir in bulker/*/; do
            if [ -f "${moddir}go.mod" ]; then
              modname=$(basename "${moddir}")
              echo "Scanning ${moddir}..."
              govulncheck -C "${{ github.workspace }}/${moddir}" -json ./... > ".go-vulns/${modname}.json" 2>/dev/null || true
            fi
          done
          jq -s 'flatten' .go-vulns/*.json > .go-vulns.json 2>/dev/null || echo '[]' > .go-vulns.json
          echo "govulncheck complete"

      - name: 🔍 Fetch Dependabot alerts
        id: dependabot
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_TOKEN }}
        run: |
          set -euo pipefail
          gh api repos/${{ github.repository }}/dependabot/alerts --paginate \
            --jq '[.[] | select(.state == "open") | {
              number: .number,
              cve: .security_advisory.cve_id,
              severity: .security_advisory.severity,
              summary: .security_advisory.summary,
              package: .security_vulnerability.package.name,
              ecosystem: .security_vulnerability.package.ecosystem,
              vulnerable_range: .security_vulnerability.vulnerable_version_range,
              fixed_version: .security_vulnerability.first_patched_version.identifier
            }]' > .dependabot-alerts.json
          echo "Dependabot alerts: $(jq length .dependabot-alerts.json)"

      - name: 📝 Write Codex prompt
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          MIN_SEVERITY: ${{ inputs.severity || 'moderate' }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p .github/codex
          cat > .github/codex/security-fix.prompt.md << PROMPT_EOF
          You are a security engineer fixing dependency vulnerabilities in a monorepo.

          ## Context
          - Repository: $REPO
          - Base branch: newjitsu
          - Dry run mode: $DRY_RUN
          - Minimum severity: $MIN_SEVERITY
          - This is a monorepo with:
            - Node.js/pnpm workspace (libs/, services/, webapps/, cli/, types/)
            - Go side: Go workspace rooted at bulker/ (bulker/go.work). All Go modules are members of this workspace — do NOT treat them as independent repos. Workspace members are listed in bulker/go.work.
            - Root package.json has pnpm.overrides for version pinning

          ## Available scan results
          - Dependabot alerts: .dependabot-alerts.json (MOST RELIABLE — use this as primary source)

          ## Instructions

          IMPORTANT: All examples below use PLACEHOLDER names. You must substitute real values from the scan results. Do NOT run any placeholder literally.

          1. Read the alerts file: cat .dependabot-alerts.json | jq .
          2. Check existing PRs to avoid duplicates: gh pr list --search "security" --state open
          3. Process each alert (or batch trivial ones together):

          ### For npm/Node.js packages:
          - Check if the package is a direct dependency: grep -r '"ACTUAL_PKG_NAME"' */package.json libs/*/package.json webapps/*/package.json cli/*/package.json
          - If transitive: add a pnpm override to root package.json. Example pattern for the overrides object: "actual-pkg@<FIXED_VER": "^FIXED_VER"
          - If direct: bump the version in the relevant package.json file
          - MANDATORY: ANY change to ANY package.json (root or workspace member) MUST be followed by `pnpm install` at the repo root before committing — this updates pnpm-lock.yaml. Commit both the package.json changes and the updated pnpm-lock.yaml together.
          - If pnpm install fails, revert the changes and skip that vulnerability.

          ### For Go packages (Go workspace at bulker/):
          - Find every workspace member that depends on the vulnerable package: `grep -l 'ACTUAL_PKG' bulker/*/go.mod`
          - For EACH matching member, update inside that module directory:
              go -C bulker/ACTUAL_MODULE get ACTUAL_PKG@vFIXED
          - After updating all affected members, sync the workspace: `go -C bulker work sync`
          - Manually clean go.sum and go.work.sum of hashes of old vulnerable versions
          - Commit the changed `go.mod`/`go.sum` files of each affected member plus `bulker/go.work.sum` together.
          - Do NOT edit `bulker/go.work` itself — only the workspace `use (...)` list lives there and it must not change for a security fix.

          ### Creating PRs:
          - Create a new branch from newjitsu: git checkout -b security/fix-ACTUAL-PKG-NAME
          - Stage and commit changes with a descriptive message
          - Push and create PR: git push -u origin HEAD && gh pr create --base newjitsu --title "TITLE" --body "BODY"
          - After creating PR, reset for the next fix: git checkout newjitsu && git reset --hard origin/newjitsu

          ### Grouping:
          - Batch multiple trivial pnpm override fixes (no major version bumps) into one PR
          - Keep major version bumps or risky changes as separate PRs

          ### PR description should include:
          - CVE ID and severity
          - One-sentence vulnerability description
          - What was changed
          - Whether this is a major version bump and any risks

          ## Rules
          - NEVER modify the newjitsu branch directly — always use a new branch
          - NEVER run placeholder commands — always substitute real package names and versions
          - If a fix fails, revert and move on
          EOF
          
          3. Group trivial patches together: if multiple vulnerabilities can be fixed by
             simple pnpm overrides with no major version bumps, batch them into one PR.
             Keep major version bumps or risky changes as individual PRs.

          4. If DRY_RUN is true, just output a report of what would be done. Do not create branches or PRs.

          ## Important rules
          - NEVER force push or modify the newjitsu branch directly.
          - Always create a NEW branch for each PR.
          - Run pnpm install after modifying package.json to verify the fix works.
          - If pnpm install fails after a fix, revert and skip that vulnerability.
          - For Go modules, use go -C bulker/modulename to run in the module directory.
          - Check existing open PRs with gh pr list --search "security" to avoid duplicates.
          PROMPT_EOF

      - name: 🔒 Fix vulnerabilities with Codex
        id: run-codex
        # openai is a major vendor with a controlled release process; @v1 is a
        # sufficient pin. SHA-pinning every OpenAI action update would be more
        # overhead than the risk warrants.
        uses: openai/codex-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/security-fix.prompt.md
          model: gpt-5.3-codex
          effort: high
          sandbox: danger-full-access
          codex-home: .github/codex/home

  # Separate job so actions: write is not available to the Codex step above.
  # ai-review.yml skips PRs opened by jitsu-code-review[bot] (codex-action's
  # write-access check fails for app-bot actors), so we dispatch it manually.
  # Running over all open security/* PRs is intentional — this workflow is
  # manual, so a re-review on an older PR is harmless.
  trigger-review:
    name: 🔍 Trigger AI Review
    needs: scan-and-fix
    if: ${{ inputs.dry_run != true }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: read
    steps:
      - name: Dispatch AI review for open security PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr list --repo ${{ github.repository }} --base newjitsu --state open \
            --json number,headRefName \
            --jq '[.[] | select(.headRefName | startswith("security/")) | .number | tostring] | .[]' \
          | while IFS= read -r num; do
              echo "Dispatching AI review for PR #$num"
              gh workflow run ai-review.yml --repo ${{ github.repository }} --ref newjitsu -f pr_number="$num"
            done

