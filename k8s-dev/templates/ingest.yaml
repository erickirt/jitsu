{{- if .Values.ingest.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
  labels:
    {{- include "jitsu-dev.labels" . | nindent 4 }}
    app.kubernetes.io/name: ingest
spec:
  replicas: {{ .Values.ingest.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ingest
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingest
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: build
          image: {{ .Values.images.goBuild }}
          workingDir: /project/{{ .Values.ingest.sourcePath }}
          command:
            - sh
            - -c
            - |
              echo "Building {{ .Values.ingest.binaryName }}..."
              go build -buildvcs=false -o /build/{{ .Values.ingest.binaryName }} .
              echo "Build complete"
          volumeMounts:
            - name: project
              mountPath: /project
              readOnly: true
            - name: build
              mountPath: /build
            - name: go-cache
              mountPath: /go-cache
          env:
            - name: GOCACHE
              value: /go-cache/build
            - name: GOMODCACHE
              value: /go-cache/mod
      containers:
        - name: ingest
          image: {{ .Values.images.goRun }}
          command: ["/build/{{ .Values.ingest.binaryName }}"]
          ports:
            - name: http
              containerPort: {{ .Values.ingest.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.ingest.metricsPort }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: jitsu-secrets
          env:
            - name: HTTP_PORT
              value: {{ .Values.ingest.port | quote }}
            {{- include "jitsu-dev.hostEnv" . | nindent 12 }}
            {{- include "jitsu-dev.commonEnv" . | nindent 12 }}
            {{- include "jitsu-dev.serviceUrls" . | nindent 12 }}
            {{- include "jitsu-dev.clickhouseEnv" . | nindent 12 }}
            {{- range $key, $value := .Values.ingest.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: build
              mountPath: /build
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: project
          hostPath:
            path: {{ .Values.projectRoot }}
            type: Directory
        - name: build
          emptyDir: {}
        - name: go-cache
          persistentVolumeClaim:
            claimName: go-cache
---
apiVersion: v1
kind: Service
metadata:
  name: ingest
  labels:
    {{- include "jitsu-dev.labels" . | nindent 4 }}
    app.kubernetes.io/name: ingest
spec:
  type: {{ .Values.ingest.serviceType | default "ClusterIP" }}
  ports:
    - port: {{ .Values.ingest.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.ingest.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: ingest
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
