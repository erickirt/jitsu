{{- if gt (int .Values.scaling.rotor.replicas) 0 }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rotor
  labels:
    {{- include "jitsu-dev.labels" . | nindent 4 }}
    app.kubernetes.io/name: rotor
spec:
  replicas: {{ .Values.scaling.rotor.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: rotor
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rotor
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: install
          image: node:24-bookworm-slim
          workingDir: /cache/workspace
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /cache/workspace

              # Check if we need to rebuild by comparing pnpm-lock.yaml hash
              LOCK_HASH=$(md5sum /project/pnpm-lock.yaml 2>/dev/null | cut -d' ' -f1 || echo "none")
              CACHED_HASH=$(cat /cache/lock-hash 2>/dev/null || echo "")

              if [ -d "/cache/workspace/node_modules" ] && [ "$LOCK_HASH" = "$CACHED_HASH" ]; then
                echo "Cache hit! Syncing source files..."
                # Install build tools needed for native modules (isolated-vm)
                apt-get update && \
                apt-get install -y ca-certificates python3 g++ make && \
                rm -rf /var/lib/apt/lists/*
                npm install -g pnpm
                # Copy only source files that changed
                cd /project && tar --exclude='node_modules' --exclude='.[^/]*' --exclude='*/node_modules' --exclude='docker/data' --exclude='*.log' -cf - . | tar -xf - -C /cache/workspace
                cd /cache/workspace
                echo "Rebuilding rotor..."
                pnpm --filter=@jitsu-internal/rotor... run build
              else
                echo "Cache miss or lockfile changed. Full rebuild..."
                echo "Installing build dependencies..."
                apt-get update && \
                apt-get install -y ca-certificates gnupg git curl python3 g++ make && \
                rm -rf /var/lib/apt/lists/*

                echo "Copying project files..."
                rm -rf /cache/workspace/*
                cd /project && tar --exclude='node_modules' --exclude='.[^/]*' --exclude='*/node_modules' --exclude='docker/data' --exclude='*.log' -cf - . | tar -xf - -C /cache/workspace

                echo "Installing pnpm..."
                npm install -g pnpm
                cd /cache/workspace

                echo "Running pnpm install..."
                pnpm install

                echo "Building rotor..."
                pnpm --filter=@jitsu-internal/rotor... run build

                # Save lock hash for next time
                echo "$LOCK_HASH" > /cache/lock-hash
              fi

              echo "Install complete"
          volumeMounts:
            - name: project
              mountPath: /project
              readOnly: true
            - name: node-cache
              mountPath: /cache
          env:
            - name: npm_config_cache
              value: /cache/npm
            - name: PNPM_HOME
              value: /cache/pnpm
      containers:
        - name: rotor
          image: node:24-bookworm-slim
          workingDir: /cache/workspace/services/rotor
          command: ["node", "--no-node-snapshot", "--max-old-space-size=2048", "dist/main.js"]
          ports:
            - name: http
              containerPort: 3401
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          envFrom:
            - secretRef:
                name: jitsu-secrets
          env:
            {{- include "jitsu-dev.commonEnv" . | nindent 12 }}
            {{- include "jitsu-dev.serviceUrls" . | nindent 12 }}
            {{- range $key, $value := .Values.env.rotor }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: node-cache
              mountPath: /cache
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: project
          hostPath:
            path: {{ .Values.projectRoot }}
            type: Directory
        - name: node-cache
          persistentVolumeClaim:
            claimName: node-cache
---
apiVersion: v1
kind: Service
metadata:
  name: rotor
  labels:
    {{- include "jitsu-dev.labels" . | nindent 4 }}
    app.kubernetes.io/name: rotor
spec:
  type: LoadBalancer
  ports:
    - port: 3401
      targetPort: http
      protocol: TCP
      name: http
    - port: 9091
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: rotor
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
