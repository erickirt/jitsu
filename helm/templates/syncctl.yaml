{{- if gt (int .Values.scaling.syncctl.replicas) 0 }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncctl
  labels:
    {{- include "jitsu-dev.labels" . | nindent 4 }}
    app.kubernetes.io/name: syncctl
spec:
  replicas: {{ .Values.scaling.syncctl.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: syncctl
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: syncctl
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: syncctl
      initContainers:
        - name: build
          image: golang:1.26-bookworm
          workingDir: /src/sync-controller
          command:
            - sh
            - -c
            - |
              echo "Copying source..."
              cp -r /project/bulker/* /src/
              echo "Building syncctl..."
              go build -buildvcs=false -o /build/syncctl .
              echo "Build complete"
          volumeMounts:
            - name: project
              mountPath: /project
              readOnly: true
            - name: build
              mountPath: /build
            - name: go-cache
              mountPath: /go-cache
            - name: src
              mountPath: /src
          env:
            - name: GOCACHE
              value: /go-cache/build
            - name: GOMODCACHE
              value: /go-cache/mod
      containers:
        - name: syncctl
          image: debian:bookworm-slim
          command: ["/build/syncctl"]
          ports:
            - name: http
              containerPort: 3043
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          envFrom:
            - secretRef:
                name: jitsu-secrets
          env:
            - name: HTTP_PORT
              value: "3043"
            # Sync Pods (CronJob + ad-hoc job_runner) run as `sync-pod`, a
            # least-privilege SA bound only to coordination.k8s.io/leases.
            # Separating it from syncctl's own SA keeps the pod-side blast
            # radius tiny (no pod create/delete, no Secret read, no log access).
            - name: PODS_SERVICE_ACCOUNT
              value: sync-pod
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- include "jitsu-dev.commonEnv" . | nindent 12 }}
            {{- include "jitsu-dev.serviceUrls" . | nindent 12 }}
            {{- range $key, $value := .Values.env.syncctl }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: build
              mountPath: /build
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: project
          hostPath:
            path: {{ .Values.projectRoot }}
            type: Directory
        - name: build
          emptyDir: {}
        - name: src
          emptyDir: {}
        - name: go-cache
          persistentVolumeClaim:
            claimName: go-cache
---
apiVersion: v1
kind: Service
metadata:
  name: syncctl
  labels:
    {{- include "jitsu-dev.labels" . | nindent 4 }}
    app.kubernetes.io/name: syncctl
spec:
  type: ClusterIP
  ports:
    - port: 3043
      targetPort: http
      protocol: TCP
      name: http
    - port: 9091
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: syncctl
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: syncctl
  labels:
    {{- include "jitsu-dev.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-syncctl
  labels:
    {{- include "jitsu-dev.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # JobRunner.getPodLogs (bulker/sync-controller/job_runner.go) tails source +
  # sidecar logs to surface them on sync failure.
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # JobRunner.getPodResUsage (bulker/sync-controller/job_runner.go) execs
  # `cat /sys/fs/cgroup/...` inside the running source container to sample
  # CPU/memory usage. Requires create on pods/exec.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-syncctl
  labels:
    {{- include "jitsu-dev.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-syncctl
subjects:
  - kind: ServiceAccount
    name: syncctl
    namespace: {{ .Release.Namespace }}
---
# `sync-pod` is the dedicated SA used by sync runtime pods (CronJob fires +
# ad-hoc job_runner pods). It only needs coordination.k8s.io/leases — the
# sidecar uses one Lease per syncID as a cross-pod mutex (see
# bulker/sync-sidecar/lease.go). Namespace-scoped Role: the lease lives in
# syncctl's own namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sync-pod
  labels:
    {{- include "jitsu-dev.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-sync-pod
  labels:
    {{- include "jitsu-dev.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-sync-pod
  labels:
    {{- include "jitsu-dev.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-sync-pod
subjects:
  - kind: ServiceAccount
    name: sync-pod
    namespace: {{ .Release.Namespace }}
{{- end }}
