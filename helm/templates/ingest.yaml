{{- if gt (int .Values.scaling.ingest.replicas) 0 }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
  labels:
    {{- include "jitsu-dev.labels" . | nindent 4 }}
    app.kubernetes.io/name: ingest
spec:
  replicas: {{ .Values.scaling.ingest.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ingest
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingest
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: build
          image: golang:1.25-bookworm
          workingDir: /src/ingest
          command:
            - sh
            - -c
            - |
              echo "Copying source..."
              cp -r /project/bulker/* /src/
              echo "Building ingest..."
              go build -buildvcs=false -o /build/ingest .
              echo "Build complete"
          volumeMounts:
            - name: project
              mountPath: /project
              readOnly: true
            - name: build
              mountPath: /build
            - name: go-cache
              mountPath: /go-cache
            - name: src
              mountPath: /src
          env:
            - name: GOCACHE
              value: /go-cache/build
            - name: GOMODCACHE
              value: /go-cache/mod
      containers:
        - name: ingest
          image: debian:bookworm-slim
          command: ["/build/ingest"]
          ports:
            - name: http
              containerPort: 3049
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          envFrom:
            - secretRef:
                name: jitsu-secrets
          env:
            - name: HTTP_PORT
              value: "3049"
            {{- include "jitsu-dev.commonEnv" . | nindent 12 }}
            {{- include "jitsu-dev.serviceUrls" . | nindent 12 }}
            {{- range $key, $value := .Values.env.ingest }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: build
              mountPath: /build
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: project
          hostPath:
            path: {{ .Values.projectRoot }}
            type: Directory
        - name: build
          emptyDir: {}
        - name: src
          emptyDir: {}
        - name: go-cache
          persistentVolumeClaim:
            claimName: go-cache
---
apiVersion: v1
kind: Service
metadata:
  name: ingest
  labels:
    {{- include "jitsu-dev.labels" . | nindent 4 }}
    app.kubernetes.io/name: ingest
spec:
  type: LoadBalancer
  ports:
    - port: 3049
      targetPort: http
      protocol: TCP
      name: http
    - port: 9091
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: ingest
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
